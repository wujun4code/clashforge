name: Android Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g. v0.1.0)'
        required: false
        default: 'dev'

permissions:
  contents: write

jobs:
  # ────────────────────────────────────────────────────────────
  # Build & Package APK Release
  # Tests run separately in android-ci.yml on PRs.
  # ────────────────────────────────────────────────────────────
  build-apk:
    name: Build & Release Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ] && echo "${{ github.ref }}" | grep -q "refs/tags/"; then
            VERSION="${{ github.ref_name }}"
          elif [ -n "${{ github.event.inputs.version }}" ] && [ "${{ github.event.inputs.version }}" != "dev" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi

          # versionName: strip leading 'v' (e.g. v0.1.0-rc.34 → 0.1.0-rc.34)
          VERSION_NAME="${VERSION#v}"

          # versionCode: count all semver tags — monotonically increases with every release
          git fetch --tags --force
          BUILD_NUMBER=$(git tag --list 'v*' \
            | grep -cE '^v[0-9]+\.[0-9]+\.[0-9]+' || echo 1)
          [ "${BUILD_NUMBER:-0}" -lt 1 ] && BUILD_NUMBER=1

          echo "version=$VERSION"           >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'

      - name: Install dependencies
        run: |
          cd mobile
          flutter pub get

      - name: Download GeoData
        run: |
          mkdir -p mobile/assets/geodata/
          curl -L -o mobile/assets/geodata/country.mmdb https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country.mmdb
          curl -L -o mobile/assets/geodata/geosite.dat https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat

      - name: Build Mihomo Core (GOOS=android -tags cmfa,with_gvisor)
        run: |
          # Two issues exist with pre-built mihomo android binaries:
          #
          # 1. GOOS=linux binaries: try to configure the TUN interface via
          #    ioctl/netlink after opening the fd — requires CAP_NET_ADMIN,
          #    which Android VPN apps don't have → "configure tun interface:
          #    permission denied".  Android VpnService already fully configures
          #    the interface before handing us the fd; we must not reconfigure it.
          #
          # 2. GOOS=android binaries (v1.18+): call buildAndroidRules() during
          #    TUN init, which reads /data/system/packages.xml.  SELinux denies
          #    this on non-rooted devices → "build android rules: ... permission
          #    denied".
          #
          # Solution: build mihomo ourselves with:
          #   GOOS=android  — correct VPN fd path (no CAP_NET_ADMIN calls)
          #   -tags cmfa    — buildAndroidRules() becomes a no-op stub (the
          #                   same approach used by ClashMetaForAndroid)
          #
          # This combination has no packages.xml read AND no TUN reconfiguration.
          MIHOMO_VER="v1.18.10"
          BASE="https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VER}"
          git clone --depth 1 --branch "${MIHOMO_VER}" \
            https://github.com/MetaCubeX/mihomo.git /tmp/mihomo-src

          # Download module dependencies and patch sing-tun fd-0 sentinel.
          # ClashVpnService passes the TUN fd on fd 0 (stdin) past Android's closeDescriptors().
          # sing-tun checks `options.FileDescriptor == 0` to decide "not set" — we change
          # that to `< 0` so that file-descriptor: 0 means "use fd 0 (stdin)".
          (cd /tmp/mihomo-src && go mod download)
          # sing-tun is vendored as github.com/metacubex/sing-tun in mihomo v1.18.x.
          # Patch tun_linux.go: ==0→<0 (not-set sentinel) and >0→>=0 (fd-provided checks).
          SINGTUN_VER=$(cd /tmp/mihomo-src && go list -m github.com/metacubex/sing-tun | awk '{print $2}')
          GOMODCACHE=$(go env GOMODCACHE)
          SINGTUN_DIR="${GOMODCACHE}/github.com/metacubex/sing-tun@${SINGTUN_VER}"
          chmod -R u+w "$SINGTUN_DIR"
          PATCHED=$(find "$SINGTUN_DIR" -name "tun_linux.go" | xargs grep -l "FileDescriptor == 0" 2>/dev/null || true)
          if [ -n "$PATCHED" ]; then
            echo "$PATCHED" | xargs sed -i \
              -e 's/options\.FileDescriptor == 0/options.FileDescriptor < 0/g' \
              -e 's/\.FileDescriptor > 0/.FileDescriptor >= 0/g'
            echo "Patched sing-tun ${SINGTUN_VER}: ==0→<0 and >0→>=0"
          else
            echo "WARNING: sentinel not found in sing-tun ${SINGTUN_VER}"
            grep -r "FileDescriptor" "$SINGTUN_DIR" --include="*.go" -l || true
            exit 1
          fi

          build_cmfa() {
            local ABI="$1" GOARCH="$2"
            local DEST="${GITHUB_WORKSPACE}/mobile/android/app/src/main/jniLibs/${ABI}/libmihomo.so"
            mkdir -p "$(dirname "$DEST")"
            GOOS=android GOARCH="$GOARCH" CGO_ENABLED=0 \
              go build -C /tmp/mihomo-src \
                -tags cmfa,with_gvisor \
                -trimpath \
                -ldflags="-s -w" \
                -o "$DEST" .
            echo "${ABI} (cmfa+gvisor): $(du -h "$DEST" | cut -f1)"
          }

          download_prebuilt() {
            local ABI="$1" ASSET="$2"
            local DEST="${GITHUB_WORKSPACE}/mobile/android/app/src/main/jniLibs/${ABI}/libmihomo.so"
            mkdir -p "$(dirname "$DEST")"
            curl -fSL -o /tmp/mihomo.gz "${BASE}/mihomo-${ASSET}-${MIHOMO_VER}.gz"
            gunzip /tmp/mihomo.gz
            mv /tmp/mihomo "$DEST"
            echo "${ABI} (pre-built): $(du -h "$DEST" | cut -f1)"
          }

          # arm64-v8a: build from source with GOOS=android -tags cmfa,with_gvisor
          # cmfa: disables packages.xml read; with_gvisor: includes gVisor TUN stack
          build_cmfa arm64-v8a arm64

          # x86_64 and armeabi-v7a: GOOS=android/{amd64,arm} requires CGO even
          # with CGO_ENABLED=0 due to assembly in mihomo deps; use pre-built binaries.
          # x86_64 is used only by emulators/Chromebooks; armeabi-v7a is legacy (<0.5%).
          download_prebuilt x86_64      android-amd64
          download_prebuilt armeabi-v7a android-armv7

          ls -lh "${GITHUB_WORKSPACE}/mobile/android/app/src/main/jniLibs/"*/

          # Verify arm64-v8a binary was built with GOOS=android, -tags cmfa, and -tags with_gvisor.
          # go version -m prints embedded build metadata; fail fast if any tag is missing.
          echo "--- arm64-v8a build metadata ---"
          ARM64_BIN="${GITHUB_WORKSPACE}/mobile/android/app/src/main/jniLibs/arm64-v8a/libmihomo.so"
          go version -m "$ARM64_BIN"
          go version -m "$ARM64_BIN" | grep -q 'GOOS=android' \
            || { echo "ERROR: arm64-v8a binary is not GOOS=android!"; exit 1; }
          go version -m "$ARM64_BIN" | grep -q 'tags.*cmfa' \
            || { echo "ERROR: arm64-v8a binary missing -tags cmfa!"; exit 1; }
          go version -m "$ARM64_BIN" | grep -q 'tags.*with_gvisor' \
            || { echo "ERROR: arm64-v8a binary missing -tags with_gvisor (gVisor TUN stack not included)!"; exit 1; }
          echo "✓ arm64-v8a: GOOS=android + -tags cmfa + -tags with_gvisor confirmed"

      - name: Configure Release Signing
        env:
          KEYSTORE_BASE64:    ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD:  ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS:          ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD:       ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > mobile/android/clashforge-release.p12
          cat > mobile/android/key.properties <<EOF
          storePassword=${KEYSTORE_PASSWORD}
          keyPassword=${KEY_PASSWORD}
          keyAlias=${KEY_ALIAS}
          storeFile=../clashforge-release.p12
          EOF

      - name: Encrypt free-node subscription URL
        id: free_node
        env:
          FREE_NODE_URL: ${{ secrets.FREE_NODE_URL }}
          FREE_NODE_AES_KEY: ${{ secrets.FREE_NODE_AES_KEY }}
        run: |
          if [ -z "$FREE_NODE_URL" ] || [ -z "$FREE_NODE_AES_KEY" ]; then
            echo "FREE_NODE_URL or FREE_NODE_AES_KEY not set — building without built-in subscription"
            echo "cipher=" >> "$GITHUB_OUTPUT"
          else
            # Key: UTF-8 bytes of first 32 chars of the key string (matches Dart key derivation)
            KEY_HEX=$(printf '%s' "${FREE_NODE_AES_KEY:0:32}" | xxd -p | tr -d '\n')
            IV_HEX=$(openssl rand -hex 16)
            CIPHER_HEX=$(printf '%s' "$FREE_NODE_URL" \
              | openssl enc -aes-256-cbc -nosalt -K "$KEY_HEX" -iv "$IV_HEX" \
              | xxd -p | tr -d '\n')
            CIPHER=$(printf '%s%s' "$IV_HEX" "$CIPHER_HEX" | xxd -r -p | base64 -w 0)
            echo "cipher=$CIPHER" >> "$GITHUB_OUTPUT"
            echo "Encrypted subscription URL (cipher preview): ${CIPHER:0:24}..."
          fi

      - name: Build Android APK
        env:
          FREE_NODE_KEY: ${{ secrets.FREE_NODE_AES_KEY }}
          FREE_NODE_CIPHER: ${{ steps.free_node.outputs.cipher }}
        run: |
          DART_DEFINES=""
          if [ -n "$FREE_NODE_CIPHER" ] && [ -n "$FREE_NODE_KEY" ]; then
            DART_DEFINES="--dart-define=FREE_NODE_CIPHER=${FREE_NODE_CIPHER} --dart-define=FREE_NODE_KEY=${FREE_NODE_KEY}"
          fi
          cd mobile
          flutter build apk --release --split-per-abi \
            --build-name="${{ steps.version.outputs.version_name }}" \
            --build-number="${{ steps.version.outputs.build_number }}" \
            $DART_DEFINES

      - name: Rename APKs with version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APKDIR="mobile/build/app/outputs/flutter-apk"
          cp "$APKDIR/app-arm64-v8a-release.apk"   "$APKDIR/clashforge-mobile_${VERSION}_android-arm64-v8a.apk"
          cp "$APKDIR/app-armeabi-v7a-release.apk"  "$APKDIR/clashforge-mobile_${VERSION}_android-armeabi-v7a.apk"
          cp "$APKDIR/app-x86_64-release.apk"       "$APKDIR/clashforge-mobile_${VERSION}_android-x86_64.apk"
          ls -lh "$APKDIR"/clashforge-mobile_*.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ClashForge Mobile ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          make_latest: true
          files: |
            mobile/build/app/outputs/flutter-apk/clashforge-mobile_${{ steps.version.outputs.version }}_android-arm64-v8a.apk
            mobile/build/app/outputs/flutter-apk/clashforge-mobile_${{ steps.version.outputs.version }}_android-armeabi-v7a.apk
            mobile/build/app/outputs/flutter-apk/clashforge-mobile_${{ steps.version.outputs.version }}_android-x86_64.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
