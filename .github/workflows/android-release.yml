name: Android Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g. v0.1.0)'
        required: false
        default: 'dev'

permissions:
  contents: write

jobs:
  # ────────────────────────────────────────────────────────────
  # Job 1: Unit & Widget Tests
  # ────────────────────────────────────────────────────────────
  test:
    name: Flutter Unit & Widget Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'

      - name: Install dependencies
        run: |
          cd mobile
          flutter pub get

      - name: Run Tests
        run: |
          cd mobile
          flutter test

  # ────────────────────────────────────────────────────────────
  # Job 2: Automated E2E Testing with Android Emulator (KVM)
  # ────────────────────────────────────────────────────────────
  e2e:
    name: Android E2E Emulated Test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules && sudo udevadm trigger

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'

      - name: Install dependencies
        run: |
          cd mobile
          flutter pub get

      - name: Run Android E2E Tests inside Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: Nexus 6
          script: |
            echo "Emulator started successfully. Running test suite placeholder..."
            cd mobile
            flutter test test/subscription_parser_test.dart

  # ────────────────────────────────────────────────────────────
  # Job 3: Build & Package APK Release
  # ────────────────────────────────────────────────────────────
  build-apk:
    name: Build & Release Android APK
    runs-on: ubuntu-latest
    needs: e2e
    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ] && echo "${{ github.ref }}" | grep -q "refs/tags/"; then
            VERSION="${{ github.ref_name }}"
          elif [ -n "${{ github.event.inputs.version }}" ] && [ "${{ github.event.inputs.version }}" != "dev" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'

      - name: Install dependencies
        run: |
          cd mobile
          flutter pub get

      - name: Download GeoData
        run: |
          mkdir -p mobile/assets/geodata/
          curl -L -o mobile/assets/geodata/country.mmdb https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country.mmdb
          curl -L -o mobile/assets/geodata/geosite.dat https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat

      - name: Build Android APK
        run: |
          cd mobile
          flutter build apk --release --split-per-abi

      - name: Sign APK (Optional / Self-signed)
        run: |
          echo "Release APKs built successfully inside mobile/build/app/outputs/flutter-apk/"

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ClashForge Mobile ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            mobile/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            mobile/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            mobile/build/app/outputs/flutter-apk/app-x86_64-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
