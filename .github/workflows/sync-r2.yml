name: Sync Release Assets to Cloudflare R2

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to sync (e.g. v0.1.0-beta.1)'
        required: true

jobs:
  sync-r2:
    name: Upload to R2
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      R2_BUCKET:      ${{ secrets.R2_BUCKET_NAME }}
      R2_ACCOUNT_ID:  ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY:  ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_KEY:  ${{ secrets.R2_SECRET_ACCESS_KEY }}
      TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.event.release.tag_name }}

    steps:
      - name: Download all release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --dir dist \
            --pattern "*.ipk" \
            --pattern "*.apk" \
            --pattern "clashforgectl.sh" \
            --pattern "clashforgectl.ps1" \
            --pattern "clashforgectl_impl.ps1" \
            --pattern "clashforgectl.cmd" \
            --pattern "clashforgectl" \
            --pattern "SHA256SUMS.txt"
          echo "=== Downloaded assets ==="
          ls -lh dist/

      - name: Install rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash
          rclone version

      - name: Configure rclone for R2
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${R2_ACCESS_KEY}
          secret_access_key = ${R2_SECRET_KEY}
          endpoint = https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com
          acl = private
          EOF

      - name: Upload assets to R2
        run: |
          set -euo pipefail
          PKG_VERSION="${TAG#v}"
          X86_IPK="clashforge_${PKG_VERSION}_x86_64.ipk"

          # Upload all assets under releases/<tag>/
          rclone copy dist/ r2:${R2_BUCKET}/releases/${TAG}/ \
            --s3-no-check-bucket \
            --progress \
            --stats-one-line

          # Also keep a "latest/" pointer (overwrite every release)
          rclone copy dist/ r2:${R2_BUCKET}/releases/latest/ \
            --s3-no-check-bucket \
            --progress \
            --stats-one-line

          # Root-level convenience aliases for bootstrap/manual x86_64 installs.
          [ -f dist/clashforgectl.ps1 ] && rclone copyto dist/clashforgectl.ps1 r2:${R2_BUCKET}/clashforgectl.ps1 --s3-no-check-bucket --progress --stats-one-line
          [ -f dist/clashforgectl_impl.ps1 ] && rclone copyto dist/clashforgectl_impl.ps1 r2:${R2_BUCKET}/clashforgectl_impl.ps1 --s3-no-check-bucket --progress --stats-one-line
          [ -f dist/clashforgectl.cmd ] && rclone copyto dist/clashforgectl.cmd r2:${R2_BUCKET}/clashforgectl.cmd --s3-no-check-bucket --progress --stats-one-line
          [ -f dist/clashforgectl.sh ] && rclone copyto dist/clashforgectl.sh r2:${R2_BUCKET}/clashforgectl.sh --s3-no-check-bucket --progress --stats-one-line
          [ -f dist/clashforgectl ] && rclone copyto dist/clashforgectl r2:${R2_BUCKET}/clashforgectl --s3-no-check-bucket --progress --stats-one-line
          [ -f "dist/${X86_IPK}" ] && rclone copyto "dist/${X86_IPK}" r2:${R2_BUCKET}/clashforge-latest-x86_64.ipk --s3-no-check-bucket --progress --stats-one-line

          echo "=== Uploaded to R2 ==="
          rclone ls r2:${R2_BUCKET}/releases/${TAG}/

      - name: Summary
        run: |
          echo "## ✅ R2 Upload Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release:** \`${TAG}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**R2 paths:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`releases/${TAG}/\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`releases/latest/\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`clashforgectl.ps1\`, \`clashforgectl_impl.ps1\`, \`clashforgectl.cmd\`, \`clashforgectl.sh\`, \`clashforgectl\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`clashforge-latest-x86_64.ipk\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Files:**" >> $GITHUB_STEP_SUMMARY
          ls dist/ | while read f; do
            echo "- \`${f}\`" >> $GITHUB_STEP_SUMMARY
          done
