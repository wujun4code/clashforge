name: "[Demo] 4 — Release"

# Step 3 of 3 (second half): Create a GitHub Release for the given tag.
#
# Triggered two ways:
#   1. workflow_dispatch — dispatched by demo-tag.yml after pushing a demo-v* tag
#      This is the normal path in the automated pipeline.
#   2. push: tags: demo-v* — fires when a human manually pushes a demo-v* tag.
#      (Tags pushed by GITHUB_TOKEN do NOT trigger this; see demo-tag.yml.)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. demo-v0.0.1)'
        required: true
  push:
    tags:
      - 'demo-v*'

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: meta
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
            SOURCE="workflow_dispatch (dispatched by demo-tag.yml)"
          else
            TAG="${{ github.ref_name }}"
            SOURCE="push:tags (manual tag push)"
          fi
          echo "tag=$TAG"       >> "$GITHUB_OUTPUT"
          echo "source=$SOURCE" >> "$GITHUB_OUTPUT"

      - name: Log release info
        run: |
          echo "========================================="
          echo " [Demo Release] Release pipeline started"
          echo "========================================="
          echo "  Tag     : ${{ steps.meta.outputs.tag }}"
          echo "  Trigger : ${{ steps.meta.outputs.source }}"
          echo "  Repo    : ${{ github.repository }}"
          echo ""
          echo "  In a real pipeline this step would:"
          echo "    1. Download build artifacts from the tag commit"
          echo "    2. Sign binaries"
          echo "    3. gh release create --generate-notes ..."
          echo "    4. Upload .ipk / .tar.gz / checksums"
          echo "    5. Publish to registries / CDN"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          echo ""
          echo " [Demo Release] Creating GitHub Release $TAG"
          gh release create "$TAG" \
            --title "Demo Release $TAG" \
            --notes "$(cat <<'EOF'
## Demo Release

This release was created automatically by the CI/CD demo pipeline.

**Pipeline steps:**
1. PR opened → auto-merge enabled
2. CI check passed → PR auto-merged
3. Merge detected → tag pushed
4. Tag pushed → this release created

> This is a demo release. No real artifacts are attached.
EOF
)" \
            --prerelease \
            --repo "${{ github.repository }}"
          echo ""
          echo "  ✅ Release created: https://github.com/${{ github.repository }}/releases/tag/$TAG"
          echo ""
          echo "===== Pipeline complete ====="
          echo "  PR → CI → Auto-merge → Tag → Release ✓"
