name: "[Demo] 4 — Release"

# Step 3 of 3 (second half): Create a GitHub Release for the given tag.
#
# Triggered two ways:
#   1. workflow_dispatch — dispatched by demo-tag.yml after pushing a demo-v* tag.
#      This is the normal path in the automated pipeline because tags pushed by
#      GITHUB_TOKEN do not trigger downstream workflows.
#   2. push: tags: demo-v* — fires when a human or app-token manually pushes a
#      demo-v* tag.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. demo-v0.0.1)'
        required: true
  push:
    tags:
      - 'demo-v*'

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_TAG: ${{ github.event.inputs.tag }}
          PUSH_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$DISPATCH_TAG"
            SOURCE="workflow_dispatch (dispatched by demo-tag.yml)"
          else
            TAG="$PUSH_TAG"
            SOURCE="push:tags (manual/app-token tag push)"
          fi
          echo "tag=$TAG"       >> "$GITHUB_OUTPUT"
          echo "source=$SOURCE" >> "$GITHUB_OUTPUT"

      - name: Log release info
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          SOURCE: ${{ steps.meta.outputs.source }}
          REPO: ${{ github.repository }}
        run: |
          echo "========================================="
          echo " [Demo Release] Release pipeline started"
          echo "========================================="
          echo "  Tag     : $TAG"
          echo "  Trigger : $SOURCE"
          echo "  Repo    : $REPO"
          echo ""
          echo "  In a real pipeline this step would:"
          echo "    1. Download build artifacts from the tag commit"
          echo "    2. Sign binaries"
          echo "    3. gh release create --generate-notes ..."
          echo "    4. Upload .ipk / .tar.gz / checksums"
          echo "    5. Publish to registries / CDN"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          echo ""
          echo " [Demo Release] Creating GitHub Release $TAG"

          cat > demo-release-notes.md <<'EOF'
          ## Demo Release

          This release was created automatically by the CI/CD demo pipeline.

          **Pipeline steps:**
          1. PR opened → auto-merge enabled
          2. CI check passed → PR auto-merged
          3. Merge detected → tag pushed
          4. Tag pushed → this release created

          > This is a demo release. No real artifacts are attached.
          EOF

          gh release create "$TAG" \
            --title "Demo Release $TAG" \
            --notes-file demo-release-notes.md \
            --prerelease \
            --repo "$REPO"
          echo ""
          echo "  ✅ Release created: https://github.com/$REPO/releases/tag/$TAG"
          echo ""
          echo "===== Pipeline complete ====="
          echo "  PR → CI → Auto-merge → Tag → Release ✓"
