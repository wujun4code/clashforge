name: "[Demo] 2 — Auto-merge"

# Step 2 of 3 (trigger): Enable GitHub's native auto-merge on every non-draft PR.
#
# GitHub will automatically merge the PR once all required status checks pass.
# The actual merge is performed by GitHub's merge service, not by this workflow —
# so the resulting push to main DOES trigger other workflows (no GITHUB_TOKEN
# recursion guard applies here).
#
# Prerequisite: "Allow auto-merge" must be enabled in Settings → General.

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: [main]

jobs:
  enable-auto-merge:
    name: Enable auto-merge
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Enable auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          REPO: ${{ github.repository }}
        run: |
          echo "========================================="
          echo " [Demo Auto-merge] Enabling auto-merge"
          echo "========================================="
          echo "  PR: #$PR_NUMBER"
          echo "  Title: $PR_TITLE"
          echo ""
          gh pr merge "$PR_NUMBER" \
            --auto --squash \
            --repo "$REPO"
          echo ""
          echo "✅ Auto-merge enabled"
          echo "   GitHub will merge this PR once 'Demo Check' passes."
