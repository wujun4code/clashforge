name: Android CI

on:
  pull_request:
    branches:
      - main
    paths:
      - 'mobile/**'
      - '.github/workflows/android-ci.yml'

jobs:
  # ────────────────────────────────────────────────────────────
  # Job 1: Unit & Widget Tests
  # ────────────────────────────────────────────────────────────
  test:
    name: Flutter Unit & Widget Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get
        working-directory: mobile

      - name: Run tests
        run: flutter test
        working-directory: mobile

  # ────────────────────────────────────────────────────────────
  # Job 2: Full E2E — subscription import + VPN on/off + 3-round IP probe
  # Mirrors the OpenWrt E2E pattern: Round1 baseline → Round2 VPN → Round3 restore
  # ────────────────────────────────────────────────────────────
  e2e:
    name: Android E2E Emulated Test
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules && sudo udevadm trigger

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get
        working-directory: mobile

      - name: Download Mihomo Core (x86_64 for emulator)
        run: |
          # Pinned to v1.18.10: v1.19.x reads /data/system/packages.xml unconditionally
          # during TUN init ("build android rules"), which is denied by SELinux on API 29.
          MIHOMO_VER="v1.18.10"
          echo "Mihomo $MIHOMO_VER — trying android-amd64 then linux-amd64-compatible"
          mkdir -p mobile/android/app/src/main/jniLibs/x86_64
          if curl -fsSL -o /tmp/mihomo.gz \
              "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VER}/mihomo-android-amd64-${MIHOMO_VER}.gz" 2>/dev/null; then
            echo "android-amd64 downloaded"
          else
            curl -fSL -o /tmp/mihomo.gz \
              "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VER}/mihomo-linux-amd64-compatible-${MIHOMO_VER}.gz"
            echo "linux-amd64-compatible downloaded (static binary works on emulator)"
          fi
          gunzip /tmp/mihomo.gz
          mv /tmp/mihomo mobile/android/app/src/main/jniLibs/x86_64/libmihomo.so
          ls -lh mobile/android/app/src/main/jniLibs/x86_64/

      - name: Download GeoData
        run: |
          mkdir -p mobile/assets/geodata/
          curl -fSL -o mobile/assets/geodata/country.mmdb \
            https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country.mmdb
          curl -fSL -o mobile/assets/geodata/geosite.dat \
            https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat
          ls -lh mobile/assets/geodata/

      # Install and start Tor — provides a SOCKS5 proxy on 127.0.0.1:9050 that exits
      # through a Tor relay (different IP than the CI host).  ClashVpnService detects
      # the open port via adb-reverse and rewrites mihomo's config to use it, so the
      # Round-2 VPN IP probe reliably returns a different IP than the baseline.
      - name: Install and start Tor (CI VPN exit relay)
        run: |
          sudo apt-get install -y tor
          sudo systemctl start tor 2>/dev/null || sudo tor --RunAsDaemon 1 --DataDirectory /tmp/tor-data
          echo "Waiting for Tor SOCKS5 on 127.0.0.1:9050 (up to 90 s)…"
          for i in $(seq 1 45); do nc -z 127.0.0.1 9050 2>/dev/null && echo "Tor ready after $((i*2))s" && break; sleep 2; done
          nc -z 127.0.0.1 9050 || (echo "ERROR: Tor did not start" && exit 1)

      # Build APK outside the emulator runner so working-directory applies correctly.
      # android-emulator-runner@v2 runs each script: line in a separate sh -c invocation,
      # so "cd mobile" on one line does NOT persist to the next line's flutter call.
      - name: Pre-build debug APK (SUBSCRIPTION_URL embedded at compile time)
        run: |
          flutter build apk --debug \
            "--dart-define=SUBSCRIPTION_URL=${SUBSCRIPTION_URL}" \
            2>&1 | tail -20
        working-directory: mobile
        env:
          SUBSCRIPTION_URL: ${{ secrets.SUBSCRIPTION_URL }}

      - name: Run Android E2E Tests inside Emulator
        uses: reactivecircus/android-emulator-runner@v2
        env:
          SUBSCRIPTION_URL: ${{ secrets.SUBSCRIPTION_URL }}
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: Nexus 6
          script: |
            set -e
            adb root 2>/dev/null || true
            adb wait-for-device
            adb shell setenforce 0 2>/dev/null || true
            adb shell chmod o+r /data/system/packages.xml 2>/dev/null || true
            adb install -t -r "${GITHUB_WORKSPACE}/mobile/build/app/outputs/flutter-apk/app-debug.apk"
            adb reverse tcp:9050 tcp:9050
            adb logcat -c 2>/dev/null || true
            (adb logcat -v time > /tmp/logcat.txt 2>&1) & LOGCAT_PID=$!; (while true; do adb shell chmod o+r /data/system/packages.xml 2>/dev/null; sleep 1; done) & CHMOD_PID=$!; (while true; do if adb shell uiautomator dump /sdcard/d.xml >/dev/null 2>&1 && adb pull /sdcard/d.xml /tmp/vd.xml >/dev/null 2>&1 && grep -q vpndialogs /tmp/vd.xml 2>/dev/null; then python3 -c "import xml.etree.ElementTree as ET,re; [print((int(m.group(1))+int(m.group(3)))//2,(int(m.group(2))+int(m.group(4)))//2) for n in ET.parse('/tmp/vd.xml').iter() if n.get('text') in ('OK','Allow','ALLOW') for m in [re.match(r'\[(\d+),(\d+)\]\[(\d+),(\d+)\]',n.get('bounds',''))] if m]" 2>/dev/null | head -1 | xargs -r adb shell input tap >/dev/null 2>&1; fi; sleep 1; done) & BGPID=$!; cd "${GITHUB_WORKSPACE}/mobile" && timeout 900 flutter test integration_test/app_e2e_test.dart "--dart-define=SUBSCRIPTION_URL=${SUBSCRIPTION_URL}" --reporter=expanded --timeout=540s; TEST_RC=$?; kill $BGPID 2>/dev/null; kill $CHMOD_PID 2>/dev/null; kill $LOGCAT_PID 2>/dev/null; sleep 2; echo "=== MihomoCore + ClashVpn + E2E Probe logcat ==="; grep -E "MihomoCore|ClashVpn|E2E|TUN|gvisor|mihomo|PR-01|PR-02|PASS|FAIL|WARN|CONNECTIVITY|proxy" /tmp/logcat.txt 2>/dev/null | tail -300 || true; exit $TEST_RC
