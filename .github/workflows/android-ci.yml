name: Android CI

on:
  pull_request:
    branches:
      - main
    # NOTE: paths filter intentionally removed from the trigger.
    # Required status checks must always report a result; if the workflow
    # never fires (because paths didn't match) GitHub shows
    # "Expected — Waiting for status to be reported" and blocks the PR.
    # Path detection is handled inside each job via the `changes` output
    # so non-mobile PRs skip quickly instead of blocking forever.

jobs:
  # ── Detect whether mobile-relevant files changed ──────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect mobile changes
        id: filter
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          if git diff --name-only "$BASE" "$HEAD" | grep -qE '^mobile/|^\.github/workflows/android'; then
            echo "mobile=true" >> $GITHUB_OUTPUT
          else
            echo "mobile=false" >> $GITHUB_OUTPUT
          fi

  # ────────────────────────────────────────────────────────────
  # Job 0: Verify arm64-v8a binary is GOOS=android -tags cmfa,with_gvisor
  #
  # Builds the real-device binary from source and inspects its
  # embedded build metadata.  Catches any regression where the
  # release workflow would produce a binary missing GOOS=android,
  # -tags cmfa (packages.xml read), or -tags with_gvisor (gVisor TUN).
  # ────────────────────────────────────────────────────────────
  verify-arm64-binary:
    name: Verify arm64-v8a (GOOS=android -tags cmfa,with_gvisor)
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Skip — no mobile changes
        if: needs.changes.outputs.mobile != 'true'
        run: echo "No mobile changes — skipping arm64 verify"
      - uses: actions/checkout@v4
        if: needs.changes.outputs.mobile == 'true'

      - name: Set up Go
        if: needs.changes.outputs.mobile == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - name: Build arm64-v8a mihomo from source and verify metadata
        if: needs.changes.outputs.mobile == 'true'
        run: |
          MIHOMO_VER="v1.18.10"
          git clone --depth 1 --branch "${MIHOMO_VER}" \
            https://github.com/MetaCubeX/mihomo.git /tmp/mihomo-src

          DEST=/tmp/libmihomo-arm64.so
          GOOS=android GOARCH=arm64 CGO_ENABLED=0 \
            go build -C /tmp/mihomo-src \
              -tags cmfa,with_gvisor -trimpath -ldflags="-s -w" \
              -o "$DEST" .
          echo "Built: $(du -h $DEST | cut -f1)"

          echo "--- Build metadata ---"
          go version -m "$DEST"

          go version -m "$DEST" | grep -q 'GOOS=android' \
            || { echo "FAIL: binary is not GOOS=android (would cause 'configure tun interface: permission denied' on real devices)"; exit 1; }
          go version -m "$DEST" | grep -q 'tags.*cmfa' \
            || { echo "FAIL: binary missing -tags cmfa (would cause 'build android rules: permission denied' via packages.xml)"; exit 1; }
          go version -m "$DEST" | grep -q 'tags.*with_gvisor' \
            || { echo "FAIL: binary missing -tags with_gvisor (gVisor TUN stack not compiled in — 'gVisor is not included in this build')"; exit 1; }
          echo "PASS: arm64-v8a is GOOS=android + -tags cmfa + -tags with_gvisor"

  # ────────────────────────────────────────────────────────────
  # Job 1: Unit & Widget Tests
  # ────────────────────────────────────────────────────────────
  test:
    name: Flutter Unit & Widget Tests
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Skip — no mobile changes
        if: needs.changes.outputs.mobile != 'true'
        run: echo "No mobile changes — skipping Flutter tests"
      - uses: actions/checkout@v4
        if: needs.changes.outputs.mobile == 'true'

      - name: Set up Java
        if: needs.changes.outputs.mobile == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        if: needs.changes.outputs.mobile == 'true'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'

      - name: Install dependencies
        if: needs.changes.outputs.mobile == 'true'
        run: flutter pub get
        working-directory: mobile

      - name: Download geodata assets
        if: needs.changes.outputs.mobile == 'true'
        run: |
          mkdir -p assets/geodata
          curl -fSL -o assets/geodata/country.mmdb \
            https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country.mmdb
          curl -fSL -o assets/geodata/geosite.dat \
            https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat
        working-directory: mobile

      - name: Run tests
        if: needs.changes.outputs.mobile == 'true'
        run: flutter test
        working-directory: mobile

  # ────────────────────────────────────────────────────────────
  # Job 2: Full E2E — subscription import + VPN on/off + 3-round IP probe
  # Mirrors the OpenWrt E2E pattern: Round1 baseline → Round2 VPN → Round3 restore
  # ────────────────────────────────────────────────────────────
  e2e:
    name: Android E2E Emulated Test
    runs-on: ubuntu-latest
    needs: [changes, test, verify-arm64-binary]
    timeout-minutes: 60
    steps:
      - name: Skip — no mobile changes
        if: needs.changes.outputs.mobile != 'true'
        run: echo "No mobile changes — skipping Android E2E"
      - uses: actions/checkout@v4
        if: needs.changes.outputs.mobile == 'true'

      - name: Enable KVM group permissions
        if: needs.changes.outputs.mobile == 'true'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules && sudo udevadm trigger

      - name: Set up Java
        if: needs.changes.outputs.mobile == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        if: needs.changes.outputs.mobile == 'true'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'

      - name: Install dependencies
        if: needs.changes.outputs.mobile == 'true'
        run: flutter pub get
        working-directory: mobile

      - name: Set up Go
        if: needs.changes.outputs.mobile == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - name: Build Mihomo Core (x86_64, GOOS=linux -tags cmfa,with_gvisor + sing-tun fd-0 patch)
        if: needs.changes.outputs.mobile == 'true'
        run: |
          # Pinned to v1.18.10: v1.19.x reads /data/system/packages.xml unconditionally
          # during TUN init ("build android rules"), which is denied by SELinux on API 29.
          MIHOMO_VER="v1.18.10"
          git clone --depth 1 --branch "${MIHOMO_VER}" \
            https://github.com/MetaCubeX/mihomo.git /tmp/mihomo-src

          # Download module dependencies into the module cache so we can patch sing-tun.
          (cd /tmp/mihomo-src && go mod download)

          # Patch sing-tun: change the "fd not set" sentinel from ==0 to <0.
          # ClashVpnService passes the TUN fd on fd 0 (stdin) past Android's closeDescriptors().
          # Without this patch sing-tun treats file-descriptor: 0 as "not set" and tries
          # to open /dev/tun → EPERM.  After the patch, 0 means "use fd 0 (stdin)".
          # Note: sing-tun is vendored as github.com/metacubex/sing-tun in mihomo v1.18.x.
          # Also patch FileDescriptor>0 checks to >=0 so fd 0 is treated as "provided fd".
          SINGTUN_VER=$(cd /tmp/mihomo-src && go list -m github.com/metacubex/sing-tun | awk '{print $2}')
          GOMODCACHE=$(go env GOMODCACHE)
          SINGTUN_DIR="${GOMODCACHE}/github.com/metacubex/sing-tun@${SINGTUN_VER}"
          chmod -R u+w "$SINGTUN_DIR"
          PATCHED=$(find "$SINGTUN_DIR" -name "tun_linux.go" | xargs grep -l "FileDescriptor == 0" 2>/dev/null || true)
          if [ -n "$PATCHED" ]; then
            echo "$PATCHED" | xargs sed -i \
              -e 's/options\.FileDescriptor == 0/options.FileDescriptor < 0/g' \
              -e 's/\.FileDescriptor > 0/.FileDescriptor >= 0/g'
            echo "Patched sing-tun ${SINGTUN_VER}: ==0→<0 and >0→>=0"
          else
            echo "WARNING: sentinel not found in sing-tun ${SINGTUN_VER}"
            grep -r "FileDescriptor" "$SINGTUN_DIR" --include="*.go" -l || true
          fi

          # Use GOOS=linux for x86_64 emulator: GOOS=android/amd64 requires CGO.
          # The sing-tun patch in tun_linux.go applies to both linux and android targets.
          # The emulator runs Linux with setenforce 0, so GOOS=linux works fine.
          DEST="${GITHUB_WORKSPACE}/mobile/android/app/src/main/jniLibs/x86_64/libmihomo.so"
          mkdir -p "$(dirname "$DEST")"
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
            go build -C /tmp/mihomo-src \
              -tags cmfa,with_gvisor \
              -trimpath \
              -ldflags="-s -w" \
              -o "$DEST" .
          echo "x86_64 (linux/cmfa+gvisor+sing-tun-fd0-patch): $(du -h "$DEST" | cut -f1)"
          ls -lh "${GITHUB_WORKSPACE}/mobile/android/app/src/main/jniLibs/x86_64/"

      - name: Download GeoData
        if: needs.changes.outputs.mobile == 'true'
        run: |
          mkdir -p mobile/assets/geodata/
          curl -fSL -o mobile/assets/geodata/country.mmdb \
            https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country.mmdb
          curl -fSL -o mobile/assets/geodata/geosite.dat \
            https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat
          ls -lh mobile/assets/geodata/

      # Install and start Tor — provides a SOCKS5 proxy on 127.0.0.1:9050 that exits
      # through a Tor relay (different IP than the CI host).  ClashVpnService detects
      # the open port via adb-reverse and rewrites mihomo's config to use it, so the
      # Round-2 VPN IP probe reliably returns a different IP than the baseline.
      - name: Install and start Tor (CI VPN exit relay)
        if: needs.changes.outputs.mobile == 'true'
        run: |
          sudo apt-get install -y tor
          sudo systemctl start tor 2>/dev/null || sudo tor --RunAsDaemon 1 --DataDirectory /tmp/tor-data
          echo "Waiting for Tor SOCKS5 on 127.0.0.1:9050 (up to 90 s)…"
          for i in $(seq 1 45); do nc -z 127.0.0.1 9050 2>/dev/null && echo "Tor ready after $((i*2))s" && break; sleep 2; done
          nc -z 127.0.0.1 9050 || (echo "ERROR: Tor did not start" && exit 1)

      # Build APK outside the emulator runner so working-directory applies correctly.
      # android-emulator-runner@v2 runs each script: line in a separate sh -c invocation,
      # so "cd mobile" on one line does NOT persist to the next line's flutter call.
      - name: Pre-build debug APK (SUBSCRIPTION_URL embedded at compile time)
        if: needs.changes.outputs.mobile == 'true'
        run: |
          flutter build apk --debug \
            "--dart-define=SUBSCRIPTION_URL=${SUBSCRIPTION_URL}" \
            2>&1 | tail -20
        working-directory: mobile
        env:
          SUBSCRIPTION_URL: ${{ secrets.SUBSCRIPTION_URL }}

      - name: Run Android E2E Tests inside Emulator
        if: needs.changes.outputs.mobile == 'true'
        uses: reactivecircus/android-emulator-runner@v2
        env:
          SUBSCRIPTION_URL: ${{ secrets.SUBSCRIPTION_URL }}
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: Nexus 6
          script: |
            set -e
            adb root 2>/dev/null || true
            adb wait-for-device
            adb shell setenforce 0 2>/dev/null || true
            adb shell chmod o+r /data/system/packages.xml 2>/dev/null || true
            adb install -t -r "${GITHUB_WORKSPACE}/mobile/build/app/outputs/flutter-apk/app-debug.apk"
            adb reverse tcp:9050 tcp:9050
            adb logcat -c 2>/dev/null || true
            (adb logcat -v time > /tmp/logcat.txt 2>&1) & LOGCAT_PID=$!; (while true; do adb shell chmod o+r /data/system/packages.xml 2>/dev/null; sleep 1; done) & CHMOD_PID=$!; (while true; do if adb shell uiautomator dump /sdcard/d.xml >/dev/null 2>&1 && adb pull /sdcard/d.xml /tmp/vd.xml >/dev/null 2>&1 && grep -q vpndialogs /tmp/vd.xml 2>/dev/null; then python3 -c "import xml.etree.ElementTree as ET,re; [print((int(m.group(1))+int(m.group(3)))//2,(int(m.group(2))+int(m.group(4)))//2) for n in ET.parse('/tmp/vd.xml').iter() if n.get('text') in ('OK','Allow','ALLOW') for m in [re.match(r'\[(\d+),(\d+)\]\[(\d+),(\d+)\]',n.get('bounds',''))] if m]" 2>/dev/null | head -1 | xargs -r adb shell input tap >/dev/null 2>&1; fi; sleep 1; done) & BGPID=$!; cd "${GITHUB_WORKSPACE}/mobile" && timeout 900 flutter test integration_test/app_e2e_test.dart "--dart-define=SUBSCRIPTION_URL=${SUBSCRIPTION_URL}" --reporter=expanded --timeout=540s; TEST_RC=$?; kill $BGPID 2>/dev/null; kill $CHMOD_PID 2>/dev/null; kill $LOGCAT_PID 2>/dev/null; sleep 2; echo "=== MihomoCore + ClashVpn + E2E Probe logcat ==="; grep -E "MihomoCore|ClashVpn|E2E|TUN|gvisor|mihomo|PR-01|PR-02|PASS|FAIL|WARN|CONNECTIVITY|proxy|flutter|CF_IMPORT" /tmp/logcat.txt 2>/dev/null | tail -300 || true; exit $TEST_RC
