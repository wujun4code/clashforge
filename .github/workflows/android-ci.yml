name: Android CI

on:
  pull_request:
    branches:
      - main
    paths:
      - 'mobile/**'
      - '.github/workflows/android-ci.yml'

jobs:
  # ────────────────────────────────────────────────────────────
  # Job 1: Unit & Widget Tests
  # ────────────────────────────────────────────────────────────
  test:
    name: Flutter Unit & Widget Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get
        working-directory: mobile

      - name: Run tests
        run: flutter test
        working-directory: mobile

  # ────────────────────────────────────────────────────────────
  # Job 2: Automated E2E Testing with Android Emulator (KVM)
  # ────────────────────────────────────────────────────────────
  e2e:
    name: Android E2E Emulated Test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules && sudo udevadm trigger

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get
        working-directory: mobile

      - name: Run Android E2E Tests inside Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: Nexus 6
          script: |
            cd mobile
            flutter test test/subscription_parser_test.dart
