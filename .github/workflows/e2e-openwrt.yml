name: E2E Integration Test (OpenWrt)

# 在 OpenWrt self-hosted runner 上运行完整生命周期测试
# 需要提前在 OpenWrt VM 上注册 GitHub Actions runner，打标签 openwrt-x86
#
# 所需 Secrets：
#   SUBSCRIPTION_URL  — 订阅 URL（含 token）
#
# 触发方式：
#   - PR 到 main 时手动触发（workflow_dispatch）
#   - 也可以 push 到 feat/e2e-* 分支自动触发

on:
  workflow_dispatch:
    inputs:
      clashforge_version:
        description: 'ClashForge 版本（留空用 latest）'
        required: false
        default: 'latest'
  push:
    branches:
      - 'feat/e2e-*'

jobs:
  e2e-openwrt:
    name: OpenWrt Lifecycle + Browser Probe
    runs-on: [self-hosted, openwrt-x86]
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Router-side: 完整生命周期测试（在 OpenWrt 上跑）─────────────────────
      - name: Router lifecycle test
        env:
          SUBSCRIPTION_URL: ${{ secrets.SUBSCRIPTION_URL }}
          CLASHFORGE_VERSION: ${{ inputs.clashforge_version || 'latest' }}
        run: |
          chmod +x tests/e2e/openwrt-lifecycle-test.sh
          sh tests/e2e/openwrt-lifecycle-test.sh

      # ── 提取代理认证信息（供 browser probe 用）───────────────────────────────
      - name: Extract proxy auth
        id: proxy
        run: |
          AUTH=$(grep -A1 'authentication:' /etc/metaclash/cache/*.raw.yaml 2>/dev/null \
            | grep -v 'authentication:' | head -1 | tr -d ' -' || echo "")
          if [ -n "$AUTH" ]; then
            echo "url=http://${AUTH}@127.0.0.1:7890" >> $GITHUB_OUTPUT
            echo "found proxy auth"
          else
            echo "url=http://127.0.0.1:7890" >> $GITHUB_OUTPUT
            echo "no auth found, using bare proxy"
          fi

      # ── Browser-side: 在宿主机（runner host）跑 node 测试 ───────────────────
      # 注意：这一步在 self-hosted runner 上跑，但通过 localhost 连到 OpenWrt 代理
      # 实际 CI 中如果 runner 在宿主机，OpenWrt VM 的代理需要通过 SSH tunnel 暴露
      - name: Browser probe test (via proxy)
        env:
          PROXY_URL: ${{ steps.proxy.outputs.url }}
          PROBE_TIMEOUT: '10000'
        run: |
          node tests/e2e/browser-probe.mjs

      # ── 清理：不管成功失败都还原 OpenWrt 状态 ───────────────────────────────
      - name: Cleanup - stop clashforge & restore state
        if: always()
        run: |
          echo "=== Emergency cleanup ==="
          curl -sf -H "Content-Type: application/json" -d '{}' \
            http://127.0.0.1:7777/api/v1/setup/stop > /dev/null 2>/dev/null || true
          /etc/init.d/clashforge stop 2>/dev/null || true
          sleep 3
          # 验证还原
          if nft list tables 2>/dev/null | grep -q "metaclash"; then
            echo "WARNING: metaclash table still present, force cleaning..."
            nft delete table inet metaclash 2>/dev/null || true
          fi
          echo "Cleanup done. nft tables: $(nft list tables 2>/dev/null | tr '\n' ' ')"
          echo "Network check: $(wget -q -O - --timeout=5 https://api.ipify.org 2>/dev/null || echo 'FAILED')"
