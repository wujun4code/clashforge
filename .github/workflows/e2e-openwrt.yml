name: E2E Integration Test (OpenWrt)

# е®Ңж•ҙз”ҹе‘Ҫе‘Ёжңҹ + жөҸи§ҲеҷЁз«ҜжҺўжөӢжөӢиҜ•
# жөҒзЁӢпјҡ
#   1. и·Ҝз”ұеҷЁз«Ҝз”ҹе‘Ҫе‘ЁжңҹпјҲе®үиЈ…вҶ’еҗҜеҠЁвҶ’жҺҘз®ЎйӘҢиҜҒвҶ’д»ЈзҗҶжңҹжҺўжөӢвҶ’еҒңжӯўвҶ’иҝҳеҺҹйӘҢиҜҒпјү
#   2. д»ЈзҗҶиҝҗиЎҢжңҹпјҡжөҸи§ҲеҷЁз«ҜжҺўжөӢпјҲиө°д»ЈзҗҶпјү
#   3. еҒңжӯўеҗҺпјҡжөҸи§ҲеҷЁз«ҜжҺўжөӢпјҲзӣҙиҝһпјҢйӘҢиҜҒжҒўеӨҚпјү
#
# жүҖйңҖ Secretsпјҡ
#   SUBSCRIPTION_URL  вҖ” и®ўйҳ… URLпјҲеҗ« tokenпјү
#
# жүҖйңҖ Runnerпјҡ
#   self-hosted, openwrt-x86 вҖ” OpenWrt VM дёҠзҡ„ GitHub Actions runner

on:
  workflow_dispatch:
    inputs:
      clashforge_version:
        description: 'ClashForge зүҲжң¬пјҲз•ҷз©әз”Ё latestпјү'
        required: false
        default: 'latest'
  push:
    branches:
      - 'feat/e2e-*'

jobs:
  e2e-openwrt:
    name: OpenWrt E2E вҖ” Lifecycle + Browser Probe
    runs-on: [self-hosted, openwrt-x86]
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # в”Җв”Җ Step 1: и·Ҝз”ұеҷЁз«Ҝз”ҹе‘Ҫе‘ЁжңҹжөӢиҜ•пјҲеҗ«д»ЈзҗҶиҝҗиЎҢжңҹи·Ҝз”ұеҷЁжҺўжөӢпјүв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: "[Router] Lifecycle test вҖ” install / launch / verify / probe"
        id: lifecycle
        env:
          SUBSCRIPTION_URL: ${{ secrets.SUBSCRIPTION_URL }}
          CLASHFORGE_VERSION: ${{ inputs.clashforge_version || 'latest' }}
          GITHUB_STEP_SUMMARY: ${{ env.GITHUB_STEP_SUMMARY }}
        run: |
          chmod +x tests/e2e/openwrt-lifecycle-test.sh
          sh tests/e2e/openwrt-lifecycle-test.sh
        # еҚідҪҝеӨұиҙҘд№ҹз»§з»ӯпјҢи®©еҗҺз»ӯ step иғҪеҒҡжё…зҗҶ

      # в”Җв”Җ Step 2: жҸҗеҸ–д»ЈзҗҶдҝЎжҒҜпјҲдҫӣ browser probe дҪҝз”Ёпјүв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Extract proxy auth
        id: proxy
        if: always()
        run: |
          AUTH=$(grep -A1 'authentication:' /etc/metaclash/cache/*.raw.yaml 2>/dev/null \
            | grep -v 'authentication:' | head -1 | tr -d ' -' || echo "")
          if [ -n "$AUTH" ]; then
            echo "url=http://${AUTH}@127.0.0.1:7890" >> $GITHUB_OUTPUT
          else
            echo "url=http://127.0.0.1:7890" >> $GITHUB_OUTPUT
          fi
          # жҸҗеҸ–д»ЈзҗҶиҠӮзӮ№дҝЎжҒҜпјҲдҫӣ browser-probe еҒҡиҠӮзӮ№еҢ№й…ҚйӘҢиҜҒпјү
          CACHE=$(ls /etc/metaclash/cache/*.raw.yaml 2>/dev/null | tail -1)
          if [ -n "$CACHE" ]; then
            NODE_NAME=$(grep -m1 'name:' "$CACHE" 2>/dev/null | sed 's/.*name: *//' | tr -d ' ')
            SERVER=$(grep -m1 'server:' "$CACHE" 2>/dev/null | awk '{print $2}' | tr -d ' ')
            echo "node_name=$NODE_NAME" >> $GITHUB_OUTPUT
            echo "server_host=$SERVER" >> $GITHUB_OUTPUT
          fi
          # еҲӨж–ӯ clashforge жҳҜеҗҰиҝҳеңЁиҝҗиЎҢ
          if pgrep -f "mihomo-clashforge" > /dev/null 2>&1; then
            echo "running=true" >> $GITHUB_OUTPUT
          else
            echo "running=false" >> $GITHUB_OUTPUT
          fi

      # в”Җв”Җ Step 3: жөҸи§ҲеҷЁз«ҜжҺўжөӢпјҲд»ЈзҗҶиҝҗиЎҢжңҹпјҢйҖҡиҝҮд»ЈзҗҶпјүв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: "[Browser] Probe вҖ” via proxy (д»ЈзҗҶиҝҗиЎҢжңҹ)"
        if: steps.proxy.outputs.running == 'true'
        env:
          PROXY_URL: ${{ steps.proxy.outputs.url }}
          PROXY_SERVER_HOST: ${{ steps.proxy.outputs.server_host }}
          PROXY_NODE_NAME: ${{ steps.proxy.outputs.node_name }}
          PROBE_TIMEOUT: '10000'
        run: |
          node tests/e2e/browser-probe.mjs

      # в”Җв”Җ Step 4: еҒңжӯў clashforgeпјҲз”ұ lifecycle и„ҡжң¬е·ІеӨ„зҗҶпјҢиҝҷйҮҢеҒҡе…ңеә•пјүв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Stop clashforge
        if: always()
        run: |
          curl -sf -H "Content-Type: application/json" -d '{}' \
            http://127.0.0.1:7777/api/v1/setup/stop > /dev/null 2>/dev/null || true
          /etc/init.d/clashforge stop 2>/dev/null || true
          sleep 5
          pkill -f "clashforge" 2>/dev/null || true
          pkill -f "mihomo-clashforge" 2>/dev/null || true
          sleep 3

      # в”Җв”Җ Step 5: жөҸи§ҲеҷЁз«ҜжҺўжөӢпјҲеҒңжӯўеҗҺпјҢзӣҙиҝһжЁЎејҸпјҢйӘҢиҜҒзҪ‘з»ңе·ІжҒўеӨҚпјүв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: "[Browser] Probe вҖ” direct only (еҒңжӯўеҗҺжҒўеӨҚйӘҢиҜҒ)"
        if: always()
        env:
          PROBE_TIMEOUT: '10000'
        run: |
          echo "## рҹ”Ғ еҒңжӯўжңҚеҠЎеҗҺжөҸи§ҲеҷЁз«ҜжҺўжөӢпјҲзӣҙиҝһжҒўеӨҚйӘҢиҜҒпјү" >> $GITHUB_STEP_SUMMARY
          node tests/e2e/browser-probe.mjs

      # в”Җв”Җ Step 6: зҙ§жҖҘжё…зҗҶпјҲж°ёиҝңжү§иЎҢпјүв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      - name: Emergency cleanup
        if: always()
        run: |
          echo "=== Emergency cleanup ==="
          # зЎ®дҝқ metaclash nft иЎЁжё…йҷӨ
          if nft list tables 2>/dev/null | grep -q "metaclash"; then
            echo "Removing metaclash nft table..."
            nft delete table inet metaclash 2>/dev/null || true
          fi
          # зҪ‘з»ңжңҖз»ҲжЈҖжҹҘ
          FINAL_IP=$(wget -q -O - --timeout=5 https://api.ipify.org 2>/dev/null || echo "FAILED")
          echo "Final network check: $FINAL_IP"
          echo ""
          echo "## рҹҸҒ жңҖз»ҲзҺҜеўғзҠ¶жҖҒ" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| йЎ№зӣ® | зҠ¶жҖҒ |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| nft иЎЁ | $(nft list tables 2>/dev/null | tr '\n' ' ') |" >> $GITHUB_STEP_SUMMARY
          echo "| еҮәеҸЈ IP | $FINAL_IP |" >> $GITHUB_STEP_SUMMARY
          if [ "$FINAL_IP" != "FAILED" ]; then
            echo "| зҪ‘з»ңзҠ¶жҖҒ | вң… жӯЈеёё |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| зҪ‘з»ңзҠ¶жҖҒ | вқҢ ејӮеёё |" >> $GITHUB_STEP_SUMMARY
          fi
