name: E2E Integration Test (OpenWrt)

# 完整生命周期 + 浏览器端探测测试
# 流程：
#   1. 路由器端生命周期（安装→启动→接管验证→代理期探测→停止→还原验证）
#   2. 代理运行期：浏览器端探测（走代理）
#   3. 停止后：浏览器端探测（直连，验证恢复）
#
# 所需 Secrets：
#   SUBSCRIPTION_URL  — 订阅 URL（含 token）
#
# 所需 Runner：
#   self-hosted, openwrt-x86 — OpenWrt VM 上的 GitHub Actions runner

on:
  workflow_dispatch:
    inputs:
      clashforge_version:
        description: 'ClashForge 版本（留空用 latest）'
        required: false
        default: 'latest'
  push:
    branches:
      - 'feat/e2e-*'

jobs:
  e2e-openwrt:
    name: OpenWrt E2E — Lifecycle + Browser Probe
    runs-on: [self-hosted, openwrt-x86]
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Step 1: 路由器端生命周期测试（含代理运行期路由器探测）─────────────────
      - name: "[Router] Lifecycle test — install / launch / verify / probe"
        id: lifecycle
        env:
          SUBSCRIPTION_URL: ${{ secrets.SUBSCRIPTION_URL }}
          CLASHFORGE_VERSION: ${{ inputs.clashforge_version || 'latest' }}
          GITHUB_STEP_SUMMARY: ${{ env.GITHUB_STEP_SUMMARY }}
        run: |
          chmod +x tests/e2e/openwrt-lifecycle-test.sh
          sh tests/e2e/openwrt-lifecycle-test.sh
        # 即使失败也继续，让后续 step 能做清理

      # ── Step 2: 提取代理信息（供 browser probe 使用）─────────────────────────
      - name: Extract proxy auth
        id: proxy
        if: always()
        run: |
          AUTH=$(grep -A1 'authentication:' /etc/metaclash/cache/*.raw.yaml 2>/dev/null \
            | grep -v 'authentication:' | head -1 | tr -d ' -' || echo "")
          if [ -n "$AUTH" ]; then
            echo "url=http://${AUTH}@127.0.0.1:7890" >> $GITHUB_OUTPUT
          else
            echo "url=http://127.0.0.1:7890" >> $GITHUB_OUTPUT
          fi
          # 判断 clashforge 是否还在运行
          if pgrep -f "mihomo-clashforge" > /dev/null 2>&1; then
            echo "running=true" >> $GITHUB_OUTPUT
          else
            echo "running=false" >> $GITHUB_OUTPUT
          fi

      # ── Step 3: 浏览器端探测（代理运行期，通过代理）─────────────────────────
      - name: "[Browser] Probe — via proxy (代理运行期)"
        if: steps.proxy.outputs.running == 'true'
        env:
          PROXY_URL: ${{ steps.proxy.outputs.url }}
          PROBE_TIMEOUT: '10000'
        run: |
          node tests/e2e/browser-probe.mjs

      # ── Step 4: 停止 clashforge（由 lifecycle 脚本已处理，这里做兜底）────────
      - name: Stop clashforge
        if: always()
        run: |
          curl -sf -H "Content-Type: application/json" -d '{}' \
            http://127.0.0.1:7777/api/v1/setup/stop > /dev/null 2>/dev/null || true
          /etc/init.d/clashforge stop 2>/dev/null || true
          sleep 5
          pkill -f "clashforge" 2>/dev/null || true
          pkill -f "mihomo-clashforge" 2>/dev/null || true
          sleep 3

      # ── Step 5: 浏览器端探测（停止后，直连模式，验证网络已恢复）────────────
      - name: "[Browser] Probe — direct only (停止后恢复验证)"
        if: always()
        env:
          PROBE_TIMEOUT: '10000'
        run: |
          echo "## 🔁 停止服务后浏览器端探测（直连恢复验证）" >> $GITHUB_STEP_SUMMARY
          node tests/e2e/browser-probe.mjs

      # ── Step 6: 紧急清理（永远执行）────────────────────────────────────────
      - name: Emergency cleanup
        if: always()
        run: |
          echo "=== Emergency cleanup ==="
          # 确保 metaclash nft 表清除
          if nft list tables 2>/dev/null | grep -q "metaclash"; then
            echo "Removing metaclash nft table..."
            nft delete table inet metaclash 2>/dev/null || true
          fi
          # 网络最终检查
          FINAL_IP=$(wget -q -O - --timeout=5 https://api.ipify.org 2>/dev/null || echo "FAILED")
          echo "Final network check: $FINAL_IP"
          echo ""
          echo "## 🏁 最终环境状态" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| nft 表 | $(nft list tables 2>/dev/null | tr '\n' ' ') |" >> $GITHUB_STEP_SUMMARY
          echo "| 出口 IP | $FINAL_IP |" >> $GITHUB_STEP_SUMMARY
          if [ "$FINAL_IP" != "FAILED" ]; then
            echo "| 网络状态 | ✅ 正常 |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 网络状态 | ❌ 异常 |" >> $GITHUB_STEP_SUMMARY
          fi
