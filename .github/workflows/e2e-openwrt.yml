name: E2E Integration Test (OpenWrt)

# 完整端到端测试
#
# 测试步骤：
#   Step 1  从当前分支/tag 编译打包 IPK
#   Step 2  基准状态快照（nft / ip-rule / dnsmasq / resolv.conf / 直连 IP）
#   Step 3  Round 1 网络探测基准（VM 内 curl，无代理）
#   Step 4  安装 IPK + 完备性检测
#   Step 5  Setup Wizard（添加订阅→导入节点→DNS→网络→launch）+ 接管断言
#   Step 6  Round 2 网络探测（VM 内 curl，tproxy 透明拦截；附加：宿主机 mixed port）
#   Step 7  停止服务 + 状态还原断言（与 Step 2 快照对比）
#   Step 8  Round 3 网络探测（VM 内 curl，恢复直连；对比 Round 1 基准）
#   Step 9  紧急清理
#
# 所需 Secrets：
#   SUBSCRIPTION_URL  — 订阅 URL（含 token）
#
# 所需 Runner：
#   self-hosted, openwrt-x86

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      clashforge_version:
        description: 'ClashForge 版本（留空用 latest）'
        required: false
        default: 'latest'
  push:
    branches:
      - 'feat/e2e-*'

jobs:
  e2e-openwrt:
    name: OpenWrt E2E — Full Lifecycle
    runs-on: [self-hosted, openwrt-x86]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      # ── Step 1: 编译打包 IPK（x86_64，内联）─────────────────────────────────────
      - name: "[Build] Compile & package IPK"
        id: build
        run: |
          # ── 版本号 ──────────────────────────────────────────────────────────────
          if [ "${{ github.event_name }}" = "push" ] && echo "${{ github.ref }}" | grep -q "refs/tags/"; then
            VERSION="${{ github.ref_name }}"
          elif [ -n "${{ inputs.clashforge_version }}" ] && [ "${{ inputs.clashforge_version }}" != "latest" ]; then
            VERSION="${{ inputs.clashforge_version }}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          PKG_VERSION="${VERSION#v}"
          echo "version=$VERSION"         >> "$GITHUB_OUTPUT"
          echo "pkg_version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "Building $VERSION (pkg: $PKG_VERSION)"

          # ── Build UI ────────────────────────────────────────────────────────────
          cd ui && npm ci --prefer-offline
          VITE_APP_VERSION="$VERSION" npm run build
          cd ..

          # ── Embed UI dist ───────────────────────────────────────────────────────
          mkdir -p internal/api/ui_dist
          cp -r ui/dist/* internal/api/ui_dist/

          # ── Build Go binary (amd64) ─────────────────────────────────────────────
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build \
              -trimpath \
              -ldflags="-s -w -X main.buildVersion=${VERSION}" \
              -o dist/clashforge-linux-amd64 \
              ./cmd/clashforge
          echo "Binary: $(ls -lh dist/clashforge-linux-amd64)"

          # ── Download bundled mihomo ─────────────────────────────────────────────
          MIHOMO_VER=$(curl -sf https://api.github.com/repos/MetaCubeX/mihomo/releases/latest \
            | grep '"tag_name"' | head -1 | cut -d'"' -f4)
          echo "Downloading mihomo $MIHOMO_VER (amd64-compatible)"
          curl -fsSL -o /tmp/mihomo.gz \
            "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VER}/mihomo-linux-amd64-compatible-${MIHOMO_VER}.gz"
          gunzip -f /tmp/mihomo.gz
          chmod +x /tmp/mihomo
          echo "mihomo: $(/tmp/mihomo -v 2>&1 | head -1)"

          # ── Package IPK ─────────────────────────────────────────────────────────
          ARCH="x86_64"
          PKG_NAME="clashforge_${PKG_VERSION}_${ARCH}.ipk"

          mkdir -p ipk/CONTROL
          mkdir -p ipk/usr/bin
          mkdir -p ipk/etc/init.d
          mkdir -p ipk/usr/share/metaclash
          mkdir -p ipk/usr/share/luci/menu.d
          mkdir -p ipk/www/luci-static/resources/view/clashforge
          mkdir -p ipk/usr/share/rpcd/acl.d

          cp dist/clashforge-linux-amd64        ipk/usr/bin/clashforge          && chmod 755 ipk/usr/bin/clashforge
          cp /tmp/mihomo                         ipk/usr/bin/mihomo-clashforge   && chmod 755 ipk/usr/bin/mihomo-clashforge
          cp openwrt/files/usr/share/luci/menu.d/luci-app-clashforge.json \
             ipk/usr/share/luci/menu.d/luci-app-clashforge.json
          cp openwrt/files/www/luci-static/resources/view/clashforge/main.js \
             ipk/www/luci-static/resources/view/clashforge/main.js
          cp openwrt/files/usr/share/rpcd/acl.d/luci-app-clashforge.json \
             ipk/usr/share/rpcd/acl.d/luci-app-clashforge.json
          cp openwrt/files/etc/init.d/metaclash  ipk/etc/init.d/clashforge      && chmod 755 ipk/etc/init.d/clashforge
          cp openwrt/files/etc/metaclash/uninstall-clashforge.sh ipk/usr/bin/uninstall-clashforge && chmod 755 ipk/usr/bin/uninstall-clashforge

          cat > ipk/CONTROL/control << EOF
          Package: clashforge
          Version: ${PKG_VERSION}
          Architecture: ${ARCH}
          Maintainer: wujun4code
          Section: net
          Priority: optional
          Depends: ca-bundle, ip-full
          Source: https://github.com/wujun4code/clashforge
          Description: Mihomo (Clash.Meta) proxy manager for OpenWrt.
           Includes bundled mihomo ${MIHOMO_VER}. Web UI on port 7777.
          EOF
          sed -i 's/^[[:space:]]*//' ipk/CONTROL/control

          touch ipk/CONTROL/conffiles
          cp openwrt/files/etc/metaclash/postinst.sh ipk/CONTROL/postinst && chmod 755 ipk/CONTROL/postinst
          cp openwrt/files/etc/metaclash/prerm.sh    ipk/CONTROL/prerm    && chmod 755 ipk/CONTROL/prerm
          cp openwrt/files/etc/metaclash/postrm.sh   ipk/CONTROL/postrm   && chmod 755 ipk/CONTROL/postrm

          python3 scripts/build_ipk.py
          ls -lh "$PKG_NAME"
          echo "ipk_path=$(pwd)/$PKG_NAME" >> "$GITHUB_OUTPUT"
          echo "ipk_name=$PKG_NAME"        >> "$GITHUB_OUTPUT"

      # ── Step 2: 基准状态快照（VM 内）──────────────────────────────────────────
      - name: "[Snapshot] Record baseline state"
        id: snapshot
        run: |
          _ssh() { ssh -o StrictHostKeyChecking=no -p 2222 root@127.0.0.1 "$@"; }

          _ssh "cat > /tmp/e2e-snapshot.sh && chmod +x /tmp/e2e-snapshot.sh" \
            < tests/e2e/vm/snapshot.sh

          _ssh "sh /tmp/e2e-snapshot.sh"

          # 读出直连 IP 供后续 steps 使用
          DIRECT_IP=$(_ssh "cat /tmp/cf-snapshot/direct-ip 2>/dev/null" || echo "unknown")
          echo "direct_ip=$DIRECT_IP" >> "$GITHUB_OUTPUT"
          echo "直连基准 IP: $DIRECT_IP"

      # ── Step 3: Round 1 网络探测基准（VM 内，无代理）─────────────────────────
      - name: "[Probe] Round 1 — Baseline (direct, no proxy)"
        id: probe_baseline
        run: |
          _ssh() { ssh -o StrictHostKeyChecking=no -p 2222 root@127.0.0.1 "$@"; }

          _ssh "cat > /tmp/e2e-probe.sh && chmod +x /tmp/e2e-probe.sh" \
            < tests/e2e/vm/probe.sh

          _ssh "PHASE=baseline sh /tmp/e2e-probe.sh"

      # ── Step 4: 安装 IPK + 完备性检测 ────────────────────────────────────────
      - name: "[Install] Install IPK & verify"
        id: install
        run: |
          _ssh() { ssh -o StrictHostKeyChecking=no -p 2222 root@127.0.0.1 "$@"; }

          IPK_PATH="${{ steps.build.outputs.ipk_path }}"
          echo "安装 IPK: $IPK_PATH"

          # 推送 IPK 到 VM 并安装
          scp -o StrictHostKeyChecking=no -P 2222 "$IPK_PATH" root@127.0.0.1:/tmp/clashforge.ipk
          _ssh "opkg install --force-reinstall /tmp/clashforge.ipk"

          # 安装内核模块
          _ssh "opkg install kmod-nft-tproxy kmod-nf-tproxy 2>/dev/null | grep -v 'up to date' || true"
          _ssh "modprobe nft_tproxy 2>/dev/null || true"

          # 启动服务（postinst 不自动启动，需手动 start）
          _ssh "/etc/init.d/clashforge start"

          # 等待 API 就绪
          _ssh "i=0; while [ \$i -lt 30 ]; do \
                  wget -q -O /dev/null --timeout=2 http://127.0.0.1:7777/api/v1/status 2>/dev/null && break; \
                  sleep 1; i=\$((i+1)); \
                done; \
                wget -q -O /dev/null --timeout=2 http://127.0.0.1:7777/api/v1/status 2>/dev/null \
                  || (echo 'API 未就绪' && exit 1)"

          # 完备性检测
          _ssh "cat > /tmp/e2e-install-verify.sh && chmod +x /tmp/e2e-install-verify.sh" \
            < tests/e2e/vm/install-verify.sh

          _ssh "sh /tmp/e2e-install-verify.sh"

      # ── Step 5: Setup Wizard + 接管断言 ──────────────────────────────────────
      - name: "[Setup] Import subscription / launch / verify takeover"
        id: setup
        env:
          SUBSCRIPTION_URL: ${{ secrets.SUBSCRIPTION_URL }}
        run: |
          _ssh() { ssh -o StrictHostKeyChecking=no -p 2222 root@127.0.0.1 "$@"; }

          _ssh "cat > /tmp/e2e-setup-launch.sh && chmod +x /tmp/e2e-setup-launch.sh" \
            < tests/e2e/vm/setup-launch.sh

          _ssh "SUBSCRIPTION_URL='$SUBSCRIPTION_URL' sh /tmp/e2e-setup-launch.sh"

          # 读出代理信息供 Step 6 使用
          PROXY_AUTH=$(_ssh "cat /tmp/cf-snapshot/proxy-auth 2>/dev/null" || echo "")
          PROXY_NODE=$(_ssh "cat /tmp/cf-snapshot/proxy-node 2>/dev/null" || echo "")
          SERVER_HOST=$(echo "$PROXY_NODE" | cut -d: -f2)

          # DoH 解析节点服务器真实 IP（在宿主机执行）
          SERVER_IP=""
          if [ -n "$SERVER_HOST" ]; then
            SERVER_IP=$(curl -sf --max-time 8 \
              "https://dns.google/resolve?name=${SERVER_HOST}&type=A" 2>/dev/null \
              | grep -o '"data":"[0-9.]*"' | head -1 | sed 's/"data":"//;s/"//' || echo "")
          fi

          echo "proxy_auth=$PROXY_AUTH"      >> "$GITHUB_OUTPUT"
          echo "proxy_node=$PROXY_NODE"      >> "$GITHUB_OUTPUT"
          echo "server_host=$SERVER_HOST"    >> "$GITHUB_OUTPUT"
          echo "server_ip=$SERVER_IP"        >> "$GITHUB_OUTPUT"
          [ -n "$PROXY_AUTH" ] && \
            echo "mixed_port_url=http://${PROXY_AUTH}@127.0.0.1:7890" >> "$GITHUB_OUTPUT" || \
            echo "mixed_port_url=http://127.0.0.1:7890"               >> "$GITHUB_OUTPUT"

          echo "节点: $PROXY_NODE / IP: $SERVER_IP"

      # ── Step 6: Round 2 网络探测（代理运行期）────────────────────────────────
      - name: "[Probe] Round 2 — Running (tproxy active)"
        id: probe_running
        run: |
          _ssh() { ssh -o StrictHostKeyChecking=no -p 2222 root@127.0.0.1 "$@"; }

          # 主路径：VM 内 curl（tproxy 透明拦截）
          _ssh "PHASE=running \
                PROXY_NODE_IP='${{ steps.setup.outputs.server_ip }}' \
                sh /tmp/e2e-probe.sh"

      # ── Step 6b: Round 2 附加 — 宿主机 mixed port ────────────────────────────
      - name: "[Probe] Round 2 — Host mixed port (browser simulation)"
        id: probe_mixed
        if: ${{ steps.setup.outputs.proxy_auth != '' }}
        run: |
          PROXY_URL="${{ steps.setup.outputs.mixed_port_url }}"
          SERVER_HOST="${{ steps.setup.outputs.server_host }}"
          NODE_NAME=$(echo "${{ steps.setup.outputs.proxy_node }}" | cut -d: -f1)

          echo "宿主机通过 mixed port 探测: $PROXY_URL"

          # 封锁宿主机直连（防止宿主机自身直连导致误判）
          MIHOMO_UID=$(ssh -o StrictHostKeyChecking=no -p 2222 root@127.0.0.1 \
            "ps -eo uid,comm 2>/dev/null | grep mihomo | head -1 | awk '{print \$1}'" 2>/dev/null || echo "")

          if [ -n "$MIHOMO_UID" ]; then
            iptables -I OUTPUT -m owner ! --uid-owner "$MIHOMO_UID" \
              -p tcp --dport 443 ! -d 127.0.0.0/8 -j REJECT 2>/dev/null || true
            iptables -I OUTPUT -m owner ! --uid-owner "$MIHOMO_UID" \
              -p tcp --dport 80  ! -d 127.0.0.0/8 -j REJECT 2>/dev/null || true
            echo "已封锁宿主机直连 80/443"
          fi

          set +e
          PROXY_URL="$PROXY_URL" \
          PROXY_SERVER_HOST="$SERVER_HOST" \
          PROXY_NODE_NAME="$NODE_NAME" \
          PROBE_TIMEOUT=12000 \
          node tests/e2e/host/browser-probe.mjs | tee /tmp/browser-probe-running.log
          PROBE_EXIT=$?
          set -e

          # 清除封锁规则
          if [ -n "$MIHOMO_UID" ]; then
            iptables -D OUTPUT -m owner ! --uid-owner "$MIHOMO_UID" \
              -p tcp --dport 443 ! -d 127.0.0.0/8 -j REJECT 2>/dev/null || true
            iptables -D OUTPUT -m owner ! --uid-owner "$MIHOMO_UID" \
              -p tcp --dport 80  ! -d 127.0.0.0/8 -j REJECT 2>/dev/null || true
            echo "iptables 封锁规则已清除"
          fi

          exit $PROBE_EXIT

      # ── Step 7: 停止服务 + 状态还原断言 ──────────────────────────────────────
      - name: "[Stop] Stop clashforge & verify rollback"
        id: stop
        if: always()
        run: |
          _ssh() { ssh -o StrictHostKeyChecking=no -p 2222 root@127.0.0.1 "$@"; }

          _ssh "cat > /tmp/e2e-stop-verify.sh && chmod +x /tmp/e2e-stop-verify.sh" \
            < tests/e2e/vm/stop-verify.sh
            < tests/e2e/vm/stop-verify.sh

          _ssh "sh /tmp/e2e-stop-verify.sh"

      # ── Step 8: Round 3 网络探测（停止后，恢复直连）──────────────────────────
      - name: "[Probe] Round 3 — Stopped (direct, restored)"
        id: probe_stopped
        if: always()
        run: |
          _ssh() { ssh -o StrictHostKeyChecking=no -p 2222 root@127.0.0.1 "$@"; }

          # 重传 probe.sh（Step 1 失败时 VM 内可能没有此文件）
          _ssh "cat > /tmp/e2e-probe.sh && chmod +x /tmp/e2e-probe.sh" \
            < tests/e2e/vm/probe.sh

          _ssh "PHASE=stopped sh /tmp/e2e-probe.sh"

      # ── Step 9: 紧急清理 ──────────────────────────────────────────────────────
      - name: "[Cleanup] Emergency cleanup"
        if: always()
        run: |
          _ssh() { ssh -o StrictHostKeyChecking=no -p 2222 root@127.0.0.1 "$@"; }

          # 确保 mihomo 已停止，残留 nft 表已清除
          _ssh "pgrep -f 'mihomo-clashforge' > /dev/null 2>&1 && \
                  curl -sf --max-time 10 -H 'Content-Type: application/json' -d '{}' \
                    http://127.0.0.1:7777/api/v1/setup/stop 2>/dev/null || true"
          _ssh "nft list tables 2>/dev/null | grep -qE 'metaclash|clashforge' && \
                  nft delete table inet metaclash 2>/dev/null || true"
          _ssh "pkill -f mihomo-clashforge 2>/dev/null || true"

          # 清理宿主机 iptables 残留（防万一）
          iptables -D OUTPUT -p tcp --dport 443 -j REJECT 2>/dev/null || true
          iptables -D OUTPUT -p tcp --dport 80  -j REJECT 2>/dev/null || true

          FINAL_IP=$(_ssh "curl -sf --max-time 8 https://api.ipify.org 2>/dev/null || echo 'FAILED'")
          NFT_TABLES=$(_ssh "nft list tables 2>/dev/null | tr '\n' ' '" || echo "unknown")

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## 🏁 最终环境状态" >> "$GITHUB_STEP_SUMMARY"
          echo "| 项目 | 状态 |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| nft 表 | ${NFT_TABLES:-(空)} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 出口 IP | $FINAL_IP |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 直连基准 IP | ${{ steps.snapshot.outputs.direct_ip }} |" >> "$GITHUB_STEP_SUMMARY"
          [ "$FINAL_IP" = "${{ steps.snapshot.outputs.direct_ip }}" ] \
            && echo "| 网络状态 | ✅ 已还原 |" >> "$GITHUB_STEP_SUMMARY" \
            || echo "| 网络状态 | ⚠️ IP 未还原（$FINAL_IP ≠ ${{ steps.snapshot.outputs.direct_ip }}）|" >> "$GITHUB_STEP_SUMMARY"

          echo "Final IP: $FINAL_IP (baseline: ${{ steps.snapshot.outputs.direct_ip }})"
