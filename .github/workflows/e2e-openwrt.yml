name: E2E Integration Test (OpenWrt)

# 完整端到端测试
#
# 安全模型：
#   - build job 跑在 GitHub 托管的 ubuntu-latest，PR 代码只在沙箱里编译，不碰 self-hosted 机器
#   - e2e job 跑在 self-hosted runner，只接收打包好的 IPK artifact，不执行任何来自 PR 的编译操作
#
# 测试步骤（e2e job）：
#   Step 0  OpenWrt VM 存活检测 + 按需冷启动
#   Step 1  下载 IPK artifact
#   Step 2  基准状态快照（nft / ip-rule / dnsmasq / resolv.conf / 直连 IP）
#   Step 3  Round 1 网络探测基准（VM 内 curl，无代理）
#   Step 4  安装 IPK + 完备性检测
#   Steps 5-8  [Scenario 1/2] dnsmasq_mode=upstream
#               Step 5  Setup Wizard + 接管断言
#               Step 6  Round 2 网络探测（代理运行期）
#               Step 7  停止服务 + 状态还原断言
#               Step 8  Round 3 网络探测（停止后恢复直连）
#   Steps 5-8  [Scenario 2/2] dnsmasq_mode=replace（复用 Scenario 1 的订阅）
#               Step 5  Setup Wizard + 接管断言（replace 模式：UCI port=0 + OUTPUT hook）
#               Step 6  Round 2 网络探测
#               Step 7  停止服务 + 状态还原断言
#               Step 8  Round 3 网络探测
#   Step 9  紧急清理
#
# 所需 Secrets：
#   SUBSCRIPTION_URL  — 订阅 URL（含 token）
#
# 所需 Runner：
#   build:      ubuntu-latest（GitHub 托管）
#   e2e:        self-hosted, openwrt-x86

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      clashforge_version:
        description: 'ClashForge 版本（留空用 latest）'
        required: false
        default: 'latest'

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1: 编译打包 IPK — 在 GitHub 托管的沙箱里执行，PR 代码不落到 self-hosted 机器
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build IPK (x86_64)
    runs-on: ubuntu-latest
    outputs:
      ipk_name: ${{ steps.pkg.outputs.ipk_name }}
      version:  ${{ steps.ver.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Compute version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ] && echo "${{ github.ref }}" | grep -q "refs/tags/"; then
            VERSION="${{ github.ref_name }}"
          elif [ -n "${{ inputs.clashforge_version }}" ] && [ "${{ inputs.clashforge_version }}" != "latest" ]; then
            VERSION="${{ inputs.clashforge_version }}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building $VERSION"

      - name: Build UI
        run: |
          cd ui && npm ci
          VITE_APP_VERSION="${{ steps.ver.outputs.version }}" npm run build
          cd ..
          mkdir -p internal/api/ui_dist
          cp -r ui/dist/* internal/api/ui_dist/

      - name: Build Go binary (amd64)
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: amd64
        run: |
          mkdir -p dist
          go build \
            -trimpath \
            -ldflags="-s -w -X main.buildVersion=${{ steps.ver.outputs.version }}" \
            -o dist/clashforge-linux-amd64 \
            ./cmd/clashforge
          echo "Binary: $(ls -lh dist/clashforge-linux-amd64)"

      - name: Download bundled mihomo
        run: |
          MIHOMO_VER=$(curl -sfL -H "Accept: application/vnd.github+json" https://api.github.com/repos/MetaCubeX/mihomo/releases/latest \
            | grep '"tag_name"' | head -1 | cut -d'"' -f4)
          echo "Downloading mihomo $MIHOMO_VER"
          curl -fsSL -o /tmp/mihomo.gz \
            "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VER}/mihomo-linux-amd64-compatible-${MIHOMO_VER}.gz"
          gunzip -f /tmp/mihomo.gz
          chmod +x /tmp/mihomo
          echo "MIHOMO_VER=$MIHOMO_VER" >> "$GITHUB_ENV"

      - name: Package IPK
        id: pkg
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          PKG_VERSION="${VERSION#v}"
          ARCH="x86_64"
          PKG_NAME="clashforge_${PKG_VERSION}_${ARCH}.ipk"

          mkdir -p ipk/CONTROL ipk/usr/bin ipk/etc/init.d \
                   ipk/usr/share/metaclash ipk/usr/share/luci/menu.d \
                   ipk/www/luci-static/resources/view/clashforge \
                   ipk/usr/share/rpcd/acl.d

          cp dist/clashforge-linux-amd64                                         ipk/usr/bin/clashforge          && chmod 755 ipk/usr/bin/clashforge
          cp /tmp/mihomo                                                          ipk/usr/bin/mihomo-clashforge   && chmod 755 ipk/usr/bin/mihomo-clashforge
          cp openwrt/files/usr/share/luci/menu.d/luci-app-clashforge.json        ipk/usr/share/luci/menu.d/
          cp openwrt/files/www/luci-static/resources/view/clashforge/main.js     ipk/www/luci-static/resources/view/clashforge/
          cp openwrt/files/usr/share/rpcd/acl.d/luci-app-clashforge.json         ipk/usr/share/rpcd/acl.d/
          cp openwrt/files/etc/init.d/metaclash                                  ipk/etc/init.d/clashforge       && chmod 755 ipk/etc/init.d/clashforge
          cp openwrt/files/etc/metaclash/uninstall-clashforge.sh                 ipk/usr/bin/uninstall-clashforge && chmod 755 ipk/usr/bin/uninstall-clashforge

          cat > ipk/CONTROL/control << EOF
          Package: clashforge
          Version: ${PKG_VERSION}
          Architecture: ${ARCH}
          Maintainer: wujun4code
          Section: net
          Priority: optional
          Depends: ca-bundle, ip-full
          Source: https://github.com/wujun4code/clashforge
          Description: Mihomo (Clash.Meta) proxy manager for OpenWrt.
           Includes bundled mihomo ${MIHOMO_VER}. Web UI on port 7777.
          EOF
          sed -i 's/^[[:space:]]*//' ipk/CONTROL/control

          touch ipk/CONTROL/conffiles
          cp openwrt/files/etc/metaclash/postinst.sh ipk/CONTROL/postinst && chmod 755 ipk/CONTROL/postinst
          cp openwrt/files/etc/metaclash/prerm.sh    ipk/CONTROL/prerm    && chmod 755 ipk/CONTROL/prerm
          cp openwrt/files/etc/metaclash/postrm.sh   ipk/CONTROL/postrm   && chmod 755 ipk/CONTROL/postrm

          PKG_NAME="$PKG_NAME" python3 scripts/build_ipk.py
          ls -lh "$PKG_NAME"
          echo "ipk_name=$PKG_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload IPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipk-e2e-x86_64
          path: "*.ipk"
          retention-days: 1

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2: E2E 测试 — 在 self-hosted runner 上执行，只消费 artifact，不编译代码
  # ────────────────────────────────────────────────────────────────────────────
  e2e-openwrt:
    name: OpenWrt E2E — Full Lifecycle
    runs-on: [self-hosted, openwrt-x86]
    needs: build
    timeout-minutes: 25

    steps:
      - name: Checkout (test scripts only)
        uses: actions/checkout@v4

      # ── Step 0: OpenWrt VM 存活检测 + 按需冷启动 ──────────────────────────
      - name: "[Step 0] Ensure OpenWrt VM is running"
        run: |
          VM_DISK="/home/jun/vms/openwrt/openwrt-new.qcow2"
          VM_PID_FILE="/tmp/openwrt-vm.pid"
          CONSOLE_LOG="/home/jun/vms/openwrt/console.log"
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=5 -p 2222"

          vm_alive() {
            ssh $SSH_OPTS root@127.0.0.1 "echo ok" >/dev/null 2>&1
          }

          if vm_alive; then
            echo "✅ OpenWrt VM 已就绪，继续测试"
            exit 0
          fi

          echo "⚠️  VM 未响应，尝试冷启动..."

          # 清理可能残留的旧进程
          if [ -f "$VM_PID_FILE" ]; then
            OLD_PID=$(cat "$VM_PID_FILE")
            kill "$OLD_PID" 2>/dev/null || true
            rm -f "$VM_PID_FILE"
          fi

          # 冷启动 VM
          qemu-system-x86_64 \
            -name openwrt \
            -machine type=q35,accel=kvm \
            -cpu host -smp 2 -m 512M \
            -drive file="$VM_DISK",if=virtio,format=qcow2 \
            -netdev user,id=net0,hostfwd=tcp::2222-:22 \
            -device virtio-net-pci,netdev=net0 \
            -serial file:"$CONSOLE_LOG" \
            -display none -daemonize -pidfile "$VM_PID_FILE"

          echo "VM 已启动（PID=$(cat $VM_PID_FILE)），等待 SSH 就绪..."

          # 最多等待 120 秒
          DEADLINE=$(($(date +%s) + 120))
          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            if vm_alive; then
              echo "✅ VM SSH 已就绪"
              exit 0
            fi
            sleep 5
          done

          echo "❌ VM 120 秒内未就绪，打印控制台日志："
          tail -50 "$CONSOLE_LOG" 2>/dev/null || echo "(无日志)"
          exit 1

      # ── Step 1: 下载 IPK artifact ──────────────────────────────────────────
      - name: "[Step 1] Download IPK artifact"
        id: download
        uses: actions/download-artifact@v4
        with:
          name: ipk-e2e-x86_64
          path: /tmp/e2e-ipk/

      # ── Step 2: 基准状态快照（VM 内）──────────────────────────────────────
      - name: "[Step 2] Record baseline state"
        id: snapshot
        run: |
          _ssh() { ssh -o StrictHostKeyChecking=no -p 2222 root@127.0.0.1 "$@"; }

          _ssh "cat > /tmp/e2e-snapshot.sh && chmod +x /tmp/e2e-snapshot.sh" \
            < tests/e2e/vm/snapshot.sh

          _ssh "sh /tmp/e2e-snapshot.sh"

          DIRECT_IP=$(_ssh "cat /tmp/cf-snapshot/direct-ip 2>/dev/null" || echo "unknown")
          echo "direct_ip=$DIRECT_IP" >> "$GITHUB_OUTPUT"
          echo "直连基准 IP: $DIRECT_IP"

      # ── Step 3: Round 1 网络探测基准（VM 内，无代理）─────────────────────
      - name: "[Step 3] Probe — Round 1 baseline (direct)"
        id: probe_baseline
        run: |
          _ssh() { ssh -o StrictHostKeyChecking=no -p 2222 root@127.0.0.1 "$@"; }

          _ssh "cat > /tmp/e2e-probe.sh && chmod +x /tmp/e2e-probe.sh" \
            < tests/e2e/vm/probe.sh

          _ssh "PHASE=baseline sh /tmp/e2e-probe.sh"

      # ── Step 4: 安装 IPK + 完备性检测 ────────────────────────────────────
      - name: "[Step 4] Install IPK & verify"
        id: install
        run: |
          _ssh() { ssh -o StrictHostKeyChecking=no -p 2222 root@127.0.0.1 "$@"; }

          IPK_NAME="${{ needs.build.outputs.ipk_name }}"
          IPK_LOCAL="/tmp/e2e-ipk/${IPK_NAME}"
          echo "安装 IPK: $IPK_NAME"

          # 先用 uninstall-clashforge 彻底清除旧版（清除 opkg 注册 + 停止服务 + 清理接管状态）
          # 注意：uninstall 会删除 /tmp/clashforge*，必须在它之后再传 IPK
          _ssh "[ -x /usr/bin/uninstall-clashforge ] && uninstall-clashforge --keep-config || true"
          sleep 1

          # 更新 opkg 包列表，使 ip-full / ca-bundle 等依赖进入 hash
          # 不运行此步骤时 --nodeps 仍会因 pkg_hash_check_unresolved 失败而报"架构不兼容"
          _ssh "opkg update 2>&1 | tail -3"

          # 传输 IPK（OpenWrt 无 sftp-server，用 ssh + cat）
          _ssh "cat > /tmp/clashforge.ipk" < "$IPK_LOCAL"

          # 验证传输成功
          IPK_SIZE=$(_ssh "wc -c < /tmp/clashforge.ipk")
          echo "IPK 传输完成，大小: ${IPK_SIZE} bytes"
          [ "$IPK_SIZE" -gt 1000 ] || (echo 'IPK 传输失败，文件过小' && exit 1)

          _ssh "opkg install --nodeps --force-downgrade /tmp/clashforge.ipk"

          # 安装内核模块
          _ssh "opkg install kmod-nft-tproxy kmod-nf-tproxy 2>/dev/null | grep -v 'up to date' || true"
          _ssh "modprobe nft_tproxy 2>/dev/null || true"
          # kmod-nf-nat is needed for dns_redirect + dns_output_redirect nat chains
          # (dnsmasq_mode=replace).  On routers with firewall3/4 it is already loaded;
          # on the minimal E2E VM it may not be, causing nft apply to fail.
          # Show output (not suppressed) so any package errors are visible in CI logs.
          _ssh "opkg install kmod-nf-nat 2>&1 | grep -v 'up to date' | head -8 || true"
          _ssh "modprobe nf_nat 2>&1 && echo '✓ nf_nat loaded' || echo '⚠ nf_nat modprobe failed (may be built-in)'"
          _ssh "lsmod 2>/dev/null | grep -E '^nf_nat' && echo '  ✓ confirmed in lsmod' || echo '  ⚠ not in lsmod (may be built-in or unavailable)'"

          # 启动服务
          _ssh "/etc/init.d/clashforge start"

          # 等待 API 就绪（最多 30s）
          _ssh "i=0; while [ \$i -lt 30 ]; do \
                  wget -q -O /dev/null --timeout=2 http://127.0.0.1:7777/api/v1/status 2>/dev/null && break; \
                  sleep 1; i=\$((i+1)); \
                done; \
                wget -q -O /dev/null --timeout=2 http://127.0.0.1:7777/api/v1/status 2>/dev/null \
                  || (echo 'API 未就绪' && exit 1)"

          # 完备性检测
          _ssh "cat > /tmp/e2e-install-verify.sh && chmod +x /tmp/e2e-install-verify.sh" \
            < tests/e2e/vm/install-verify.sh

          _ssh "sh /tmp/e2e-install-verify.sh"

      # ── Scenario 1/2: dnsmasq_mode=upstream ──────────────────────────────────
      - name: "[Scenario 1/2] dnsmasq_mode=upstream"
        uses: ./.github/actions/e2e-scenario
        with:
          dnsmasq_mode: upstream
          subscription_url: ${{ secrets.SUBSCRIPTION_URL }}
          reuse_subscription: 'false'
          scenario_label: 'Scenario 1/2 — dnsmasq_mode=upstream'

      # ── Pre-check before replace mode ────────────────────────────────────────
      # dnsmasq_mode=replace requires nftables nat hook support (nf_nat module).
      # This step dumps state for diagnostics AND hard-fails if nat hooks are broken,
      # giving a clear error rather than a cryptic failure deep inside Scenario 2.
      - name: "[Pre-check] nftables nat hook support (dnsmasq_mode=replace)"
        run: |
          _ssh() { ssh -o StrictHostKeyChecking=no -p 2222 root@127.0.0.1 "$@"; }
          echo "=== UCI dnsmasq state after Scenario 1 ==="
          _ssh "uci show dhcp.@dnsmasq[0] 2>&1 || echo N/A"
          echo "=== nft tables ==="
          _ssh "nft list tables 2>/dev/null || echo none"
          echo "=== kernel modules (nf/nft) ==="
          _ssh "lsmod 2>/dev/null | grep -E 'nf_nat|nft_' | head -10 || echo none"
          echo "=== port 53 listeners ==="
          _ssh "ss -tuln 2>/dev/null | grep ':53 ' || echo 'nothing on :53'"
          echo "=== nat hook probe ==="
          _ssh "nft add table inet __cfnat_test 2>/dev/null || true; \
            if nft add chain inet __cfnat_test pre \
                '{ type nat hook prerouting priority dstnat; policy accept; }' 2>/dev/null; then \
              echo '✓ nat hooks supported'; \
            else \
              echo '✗ nat hooks NOT supported — kmod-nf-nat may not be loaded'; \
              nft delete table inet __cfnat_test 2>/dev/null || true; \
              exit 1; \
            fi; \
            nft delete table inet __cfnat_test 2>/dev/null || true"

      # ── Scenario 2/2: dnsmasq_mode=replace ───────────────────────────────────
      - name: "[Scenario 2/2] dnsmasq_mode=replace"
        uses: ./.github/actions/e2e-scenario
        with:
          dnsmasq_mode: replace
          subscription_url: ${{ secrets.SUBSCRIPTION_URL }}
          reuse_subscription: 'true'
          scenario_label: 'Scenario 2/2 — dnsmasq_mode=replace'

      # ── Step 9: 紧急清理 ──────────────────────────────────────────────────
      - name: "[Step 9] Emergency cleanup"
        if: always()
        run: |
          _ssh() { ssh -o StrictHostKeyChecking=no -p 2222 root@127.0.0.1 "$@"; }

          _ssh "pgrep -f 'mihomo-clashforge' > /dev/null 2>&1 && \
                  curl -sf --max-time 10 -H 'Content-Type: application/json' -d '{}' \
                    http://127.0.0.1:7777/api/v1/setup/stop 2>/dev/null || true"

          # 完整卸载 clashforge（清除 opkg 注册、进程、nft、dnsmasq）确保下次 run 清空进入
          _ssh "[ -x /usr/bin/uninstall-clashforge ] && uninstall-clashforge || true"
          _ssh "sed -i '/^Package: clashforge/,/^\$/d' /usr/lib/opkg/status 2>/dev/null || true"

          # 清理宿主机 iptables 残留
          iptables -D OUTPUT -p tcp --dport 443 -j REJECT 2>/dev/null || true
          iptables -D OUTPUT -p tcp --dport 80  -j REJECT 2>/dev/null || true

          FINAL_IP=$(_ssh "curl -sf --max-time 8 https://api.ipify.org 2>/dev/null || echo 'FAILED'")
          FINAL_IP_MASKED=$(echo "$FINAL_IP" | sed 's/\([0-9]*\)\.[0-9]*\.[0-9]*\.\([0-9]*\)/\1.*.*.\2/')
          NFT_TABLES=$(_ssh "nft list tables 2>/dev/null | tr '\n' ' '" || echo "unknown")
          BASELINE="${{ steps.snapshot.outputs.direct_ip }}"
          BASELINE_MASKED=$(echo "$BASELINE" | sed 's/\([0-9]*\)\.[0-9]*\.[0-9]*\.\([0-9]*\)/\1.*.*.\2/')

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## 🏁 最终环境状态" >> "$GITHUB_STEP_SUMMARY"
          echo "| 项目 | 状态 |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| nft 表 | ${NFT_TABLES:-(空)} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 出口 IP | $FINAL_IP_MASKED |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 直连基准 IP | $BASELINE_MASKED |" >> "$GITHUB_STEP_SUMMARY"
          [ "$FINAL_IP" = "$BASELINE" ] \
            && echo "| 网络状态 | ✅ 已还原 |"   >> "$GITHUB_STEP_SUMMARY" \
            || echo "| 网络状态 | ⚠️ IP 未还原（$FINAL_IP_MASKED ≠ $BASELINE_MASKED）|" >> "$GITHUB_STEP_SUMMARY"
