name: Auto-merge on CI Pass

# Enables GitHub's native auto-merge on every PR.
# The actual merge happens automatically once all required status checks pass.
# Requires: Settings → General → "Allow auto-merge" must be enabled.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

jobs:
  enable-automerge:
    name: Enable auto-merge
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Enable auto-merge (squash)
        run: gh pr merge --auto --squash "${{ github.event.pull_request.number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
