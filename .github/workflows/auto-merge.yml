name: Auto-merge

# Enable GitHub's native auto-merge on every non-draft PR targeting main.
#
# WHY GH_PAT instead of GITHUB_TOKEN:
#   GitHub's recursion guard blocks all downstream workflow events when a merge
#   is performed or enabled via GITHUB_TOKEN. Using a PAT (real user identity)
#   bypasses this guard, so the push to main after auto-merge correctly triggers
#   auto-tag.yml.
#
# Prerequisites:
#   1. Settings → General → Allow auto-merge ☑
#   2. Settings → Branches → main → Require status checks before merging ☑
#      Required checks: "UI Build", "Go Build"
#   3. Repository secret GH_PAT = Personal Access Token with repo scope

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
    branches: [main]

jobs:
  enable-auto-merge:
    name: Enable auto-merge
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Enable auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh pr merge ${{ github.event.number }} \
            --auto --squash \
            --repo ${{ github.repository }}
