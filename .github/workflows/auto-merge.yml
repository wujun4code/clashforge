name: Auto Merge on CI Pass

# Automatically enables squash-merge on every PR targeting main.
# GitHub will execute the merge as soon as all required status checks pass.
# No manual "Enable auto-merge" click needed.

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - main

jobs:
  enable-auto-merge:
    name: Enable auto-merge
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Enable auto-merge (squash)
        run: gh pr merge "$PR_URL" --auto --squash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
