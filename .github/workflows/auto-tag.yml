name: CI Pass → Merge, Tag, Release

# This single workflow replaces auto-merge.yml + auto-tag.yml.
#
# Root cause of the old approach failing:
#   GITHUB_TOKEN-triggered events (merges, pushes) do NOT cascade to other
#   workflows — GitHub security policy. So auto-merge.yml (GITHUB_TOKEN merge)
#   could never trigger auto-tag.yml, regardless of the event type.
#
# Solution: do merge + tag + release dispatch all inside ONE workflow_run job.
#   workflow_run fires when CI completes. Since this is a native GitHub event
#   (not a GITHUB_TOKEN cascade), it is always delivered.
#
# Flow:
#   CI passes on PR branch
#     → workflow_run fires (this workflow)
#       → squash-merge the PR
#       → compute + push next version tag
#       → gh workflow run release.yml --ref <tag>   ← explicit dispatch, always works

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  merge-tag-release:
    name: Merge PR, bump tag, trigger release
    # Only run when CI passed and was triggered by a pull_request event
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve PR number
        id: pr
        run: |
          PR_NUMBER=$(echo '${{ toJson(github.event.workflow_run.pull_requests) }}' \
            | jq -r '.[0].number // empty')
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR associated with this workflow run — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Squash-merge PR
        if: steps.pr.outputs.skip != 'true'
        run: |
          gh pr merge "${{ steps.pr.outputs.number }}" \
            --squash \
            --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch merged main
        if: steps.pr.outputs.skip != 'true'
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Compute next tag
        id: next
        if: steps.pr.outputs.skip != 'true'
        run: |
          LATEST=$(git tag --list 'v*' --sort=-version:refname | head -1)
          echo "Latest tag: $LATEST"

          if [ -z "$LATEST" ]; then
            NEXT="v0.1.0-alpha.1"
          elif echo "$LATEST" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+-alpha\.[0-9]+$'; then
            BASE=$(echo "$LATEST" | sed 's/\.[0-9]*$//')
            N=$(echo "$LATEST" | grep -oE '[0-9]+$')
            NEXT="${BASE}.$((N + 1))"
          elif echo "$LATEST" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            MAJOR=$(echo "$LATEST" | cut -d. -f1 | tr -d 'v')
            MINOR=$(echo "$LATEST" | cut -d. -f2)
            PATCH=$(echo "$LATEST" | cut -d. -f3)
            NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          else
            NEXT="${LATEST}-1"
          fi

          echo "Next tag: $NEXT"
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Push tag
        if: steps.pr.outputs.skip != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.next.outputs.tag }}" \
            -m "Release ${{ steps.next.outputs.tag }} (PR #${{ steps.pr.outputs.number }})"
          git push origin "${{ steps.next.outputs.tag }}"

      # Tag push via GITHUB_TOKEN does NOT trigger release.yml's on:push:tags.
      # Use explicit workflow_dispatch — this always works.
      - name: Trigger release build
        if: steps.pr.outputs.skip != 'true'
        run: |
          gh workflow run release.yml \
            --ref "${{ steps.next.outputs.tag }}" \
            --field version="${{ steps.next.outputs.tag }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
