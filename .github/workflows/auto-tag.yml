name: Auto Tag & Release on main push

# 触发条件：有 commit 推送到 main 分支时
# 不使用 pull_request.closed，因为 GitHub auto-merge 有时不触发该事件

on:
  push:
    branches:
      - main

jobs:
  tag-release:
    name: Bump tag, trigger release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch merged main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Compute next tag
        id: next
        run: |
          LATEST=$(git tag --list 'v*' --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+-alpha\.[0-9]+$' \
            | head -1)
          echo "Latest clean tag: $LATEST"

          if [ -z "$LATEST" ]; then
            NEXT="v0.1.0-alpha.1"
          else
            BASE=$(echo "$LATEST" | sed 's/\.[0-9]*$//')
            N=$(echo "$LATEST" | grep -oE '[0-9]+$')
            NEXT="${BASE}.$((N + 1))"
          fi

          echo "Next tag: $NEXT"
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.next.outputs.tag }}" \
            -m "Release ${{ steps.next.outputs.tag }}"
          git push origin "${{ steps.next.outputs.tag }}"

      - name: Trigger release build
        run: |
          gh workflow run release.yml \
            --ref "${{ steps.next.outputs.tag }}" \
            --field version="${{ steps.next.outputs.tag }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
