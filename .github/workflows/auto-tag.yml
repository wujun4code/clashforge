name: Auto Tag & Release

# Release chain:
#   pull_request_target.closed  — fires when any PR merges to main (manual UI
#     merge or GitHub auto-merge).  Runs in the BASE branch context so it has
#     access to repo secrets and write permissions.
#   push.main  — fallback for direct commits / emergency fixes to main.
#   workflow_dispatch  — manual backfill or re-run.
#
# Race-condition prevention:
#   Both pull_request_target.closed and push.main fire for the same auto-merged
#   PR (merge_commit_sha == github.sha).  Using a SHA-keyed concurrency group
#   ensures at most one job runs at a time; the queued job finds the tag already
#   present and exits cleanly without duplicating the release dispatch.
#
# Tags created by GITHUB_TOKEN do not trigger push:tags: in release.yml (GitHub
# Actions recursion guard), so this workflow dispatches release.yml explicitly
# via gh workflow run after pushing the tag.

on:
  pull_request_target:
    types:
      - closed
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      sha:
        description: 'Commit SHA to tag; defaults to current ref'
        required: false
        default: ''

concurrency:
  # Key on the actual commit SHA so both triggers (pull_request_target.closed
  # and push.main) for the same merge commit share one slot and serialize
  # instead of racing to push the same tag simultaneously.
  group: auto-tag-${{ github.event.pull_request.merge_commit_sha || github.event.inputs.sha || github.sha }}
  cancel-in-progress: false

jobs:
  tag-release:
    name: Bump tag, trigger release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
      pull-requests: read

    # Closed-but-unmerged PRs are ignored before a runner is allocated.
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request_target' && github.event.pull_request.merged == true)

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve commit to release
        id: target
        env:
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_SHA: ${{ github.event.inputs.sha }}
          PR_MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "pull_request_target" ]; then
            TARGET_SHA="$PR_MERGE_SHA"
            REASON="merged PR #$PR_NUMBER"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TARGET_SHA="${MANUAL_SHA:-${{ github.sha }}}"
            REASON="manual dispatch"
          else
            TARGET_SHA="${{ github.sha }}"
            REASON="main push"
          fi

          if [ -z "${TARGET_SHA:-}" ]; then
            echo "Could not resolve target commit for $REASON" >&2
            exit 1
          fi

          git fetch origin main --tags --force
          if ! git cat-file -e "$TARGET_SHA^{commit}" 2>/dev/null; then
            git fetch origin "$TARGET_SHA"
          fi

          echo "Target: $TARGET_SHA ($REASON)"
          echo "sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"

      - name: Check for existing release tag on target
        id: existing
        run: |
          set -euo pipefail
          git fetch origin --tags --force
          EXISTING=$(git tag --points-at "${{ steps.target.outputs.sha }}" --list 'v[0-9]*.[0-9]*.[0-9]*-alpha.[0-9]*' | sort -V | tail -1 || true)
          if [ -n "$EXISTING" ]; then
            echo "Commit already tagged as $EXISTING"
            echo "tag=$EXISTING" >> "$GITHUB_OUTPUT"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next tag
        id: next
        if: steps.existing.outputs.skip != 'true'
        run: |
          set -euo pipefail
          LATEST=$(git tag --list 'v*' --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+-alpha\.[0-9]+$' \
            | head -1 || true)
          echo "Latest clean tag: $LATEST"

          if [ -z "$LATEST" ]; then
            NEXT="v0.1.0-alpha.1"
          else
            BASE=$(echo "$LATEST" | sed 's/\.[0-9]*$//')
            N=$(echo "$LATEST" | grep -oE '[0-9]+$')
            NEXT="${BASE}.$((N + 1))"
          fi

          echo "Next tag: $NEXT"
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Push tag
        if: steps.existing.outputs.skip != 'true'
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.next.outputs.tag }}" "${{ steps.target.outputs.sha }}" \
            -m "Release ${{ steps.next.outputs.tag }}"
          git push origin "${{ steps.next.outputs.tag }}"

      - name: Trigger release build
        if: steps.existing.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh workflow run release.yml \
            --ref "${{ steps.next.outputs.tag }}" \
            --field version="${{ steps.next.outputs.tag }}"
