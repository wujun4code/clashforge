name: iOS CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ── Detect whether mobile-relevant files changed ──────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect mobile changes
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mobile=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          if git diff --name-only "$BASE" "$HEAD" | grep -Eq '^mobile/'; then
            echo "mobile=true" >> $GITHUB_OUTPUT
          else
            echo "mobile=false" >> $GITHUB_OUTPUT
          fi

  # ── Job 1: bridge unit tests (cheap, Linux) ───────────────────────────
  bridge-tests:
    name: MihomoBridge go tests
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Skip — no mobile changes
        if: needs.changes.outputs.mobile != 'true'
        run: echo "No mobile changes — skipping"
      - uses: actions/checkout@v4
        if: needs.changes.outputs.mobile == 'true'
      - uses: actions/setup-go@v5
        if: needs.changes.outputs.mobile == 'true'
        with:
          go-version-file: mobile/ios/MihomoBridge/go.mod
          cache-dependency-path: mobile/ios/MihomoBridge/go.sum
      - name: go vet + test
        if: needs.changes.outputs.mobile == 'true'
        working-directory: mobile/ios/MihomoBridge
        run: |
          go vet ./...
          go test ./...
      - name: Cross-compile check (ios/arm64)
        if: needs.changes.outputs.mobile == 'true'
        working-directory: mobile/ios/MihomoBridge
        run: GOOS=ios GOARCH=arm64 CGO_ENABLED=0 go build ./...

  # ── Job 2: full unsigned iOS build (gomobile + flutter) ───────────────
  build-ios:
    name: Build iOS app (no codesign)
    needs: changes
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - name: Skip — no mobile changes
        if: needs.changes.outputs.mobile != 'true'
        run: echo "No mobile changes — skipping iOS build"
      - uses: actions/checkout@v4
        if: needs.changes.outputs.mobile == 'true'

      - uses: actions/setup-go@v5
        if: needs.changes.outputs.mobile == 'true'
        with:
          go-version-file: mobile/ios/MihomoBridge/go.mod
          cache-dependency-path: mobile/ios/MihomoBridge/go.sum

      - uses: subosito/flutter-action@v2
        if: needs.changes.outputs.mobile == 'true'
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: Build Mihomobridge.xcframework (gomobile)
        if: needs.changes.outputs.mobile == 'true'
        run: bash mobile/scripts/build-mihomo-ios.sh

      - name: Download geodata assets
        if: needs.changes.outputs.mobile == 'true'
        working-directory: mobile
        run: |
          mkdir -p assets/geodata
          curl -fSL -o assets/geodata/country.mmdb \
            https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country.mmdb
          curl -fSL -o assets/geodata/geosite.dat \
            https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat
          ls -lh assets/geodata/

      - name: Flutter analyze
        if: needs.changes.outputs.mobile == 'true'
        working-directory: mobile
        run: |
          flutter pub get
          flutter analyze --no-fatal-infos

      - name: Flutter build ios --no-codesign
        if: needs.changes.outputs.mobile == 'true'
        working-directory: mobile
        run: flutter build ios --release --no-codesign

      - name: Verify PacketTunnel.appex embedded
        if: needs.changes.outputs.mobile == 'true'
        run: |
          APP=mobile/build/ios/iphoneos/Runner.app
          test -d "$APP/PlugIns/PacketTunnel.appex" || {
            echo "::error::PacketTunnel.appex missing from Runner.app/PlugIns"
            exit 1
          }
          ls -la "$APP/PlugIns/PacketTunnel.appex"
          du -sh "$APP" "$APP/PlugIns/PacketTunnel.appex"

      - name: Upload Runner.app artifact
        if: needs.changes.outputs.mobile == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-runner-unsigned
          path: mobile/build/ios/iphoneos/Runner.app
          retention-days: 7
