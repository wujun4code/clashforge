name: Build OpenWrt Hyper-V Images

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      clashforge_version:
        description: 'ClashForge tag (e.g. v0.1.0). Use latest for newest release.'
        required: true
        default: 'latest'
      tracks:
        description: 'Build track'
        required: true
        type: choice
        default: both
        options:
          - both
          - 24.10-ipk
          - 25.12-apk
      openwrt_24_version:
        description: 'OpenWrt 24.10.x version (optional, default: oldstable from .versions.json)'
        required: false
        default: ''
      openwrt_25_version:
        description: 'OpenWrt 25.12.x version (optional, default: stable from .versions.json)'
        required: false
        default: ''

jobs:
  resolve-openwrt:
    name: Resolve OpenWrt Versions
    runs-on: ubuntu-latest
    outputs:
      stable: ${{ steps.versions.outputs.stable }}
      oldstable: ${{ steps.versions.outputs.oldstable }}
    steps:
      - name: Resolve stable/oldstable
        id: versions
        run: |
          JSON="$(curl -fsSL https://downloads.openwrt.org/.versions.json)"
          STABLE="$(printf '%s' "$JSON" | python3 -c 'import sys, json; print(json.load(sys.stdin)["stable_version"])')"
          OLDSTABLE="$(printf '%s' "$JSON" | python3 -c 'import sys, json; print(json.load(sys.stdin)["oldstable_version"])')"
          echo "stable=$STABLE" >> "$GITHUB_OUTPUT"
          echo "oldstable=$OLDSTABLE" >> "$GITHUB_OUTPUT"
          echo "stable=$STABLE"
          echo "oldstable=$OLDSTABLE"

  build-24-ipk:
    name: Build Hyper-V Image (24.10-ipk)
    runs-on: ubuntu-latest
    needs: resolve-openwrt
    if: ${{ github.event.inputs.tracks == 'both' || github.event.inputs.tracks == '24.10-ipk' }}
    permissions:
      contents: read

    steps:
      - name: Install host deps
        run: |
          sudo apt-get update
          sudo apt-get install -y jq zstd qemu-utils

      - name: Resolve build variables
        id: vars
        env:
          INPUT_TAG: ${{ github.event.inputs.clashforge_version }}
          INPUT_OWRT: ${{ github.event.inputs.openwrt_24_version }}
          FALLBACK_OWRT: ${{ needs.resolve-openwrt.outputs.oldstable }}
        run: |
          if [ -n "$INPUT_OWRT" ]; then
            OWRT_VER="$INPUT_OWRT"
          else
            OWRT_VER="$FALLBACK_OWRT"
          fi

          if [ "$INPUT_TAG" = "latest" ] || [ -z "$INPUT_TAG" ]; then
            TAG="$(gh api repos/${GITHUB_REPOSITORY}/releases/latest --jq '.tag_name')"
          else
            TAG="$INPUT_TAG"
          fi

          PKG_VER="${TAG#v}"
          PKG_FILE="clashforge_${PKG_VER}_x86_64.ipk"
          TRACK="24.10-ipk"

          echo "owrt_ver=$OWRT_VER" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "pkg_file=$PKG_FILE" >> "$GITHUB_OUTPUT"
          echo "track=$TRACK" >> "$GITHUB_OUTPUT"

      - name: Download ClashForge package asset
        run: |
          mkdir -p work/pkg
          gh release download "${{ steps.vars.outputs.tag }}" \
            --pattern "${{ steps.vars.outputs.pkg_file }}" \
            --dir work/pkg \
            --clobber
          ls -lh work/pkg

      - name: Download OpenWrt ImageBuilder
        run: |
          mkdir -p work
          OWRT_VER="${{ steps.vars.outputs.owrt_ver }}"
          BASE="https://downloads.openwrt.org/releases/${OWRT_VER}/targets/x86/64"
          IB="openwrt-imagebuilder-${OWRT_VER}-x86-64.Linux-x86_64.tar.zst"
          curl -fsSL -o "work/${IB}" "${BASE}/${IB}"
          tar --zstd -xf "work/${IB}" -C work
          ls -1 work | grep '^openwrt-imagebuilder-' | head -1

      - name: Build OpenWrt image with ClashForge
        run: |
          IB_DIR="$(ls -1d work/openwrt-imagebuilder-* | head -1)"
          cp "work/pkg/${{ steps.vars.outputs.pkg_file }}" "$IB_DIR/packages/"

          pushd "$IB_DIR"
          make package_index
          make image PROFILE=generic PACKAGES="clashforge"
          popd

      - name: Convert to Hyper-V disks
        run: |
          IB_DIR="$(ls -1d work/openwrt-imagebuilder-* | head -1)"
          OUT_DIR="${IB_DIR}/bin/targets/x86/64"

          IMG_GZ="$(ls "$OUT_DIR"/*generic-ext4-combined-efi.img.gz 2>/dev/null | head -1)"
          if [ -z "$IMG_GZ" ]; then
            IMG_GZ="$(ls "$OUT_DIR"/*combined-efi*.img.gz | head -1)"
          fi
          [ -n "$IMG_GZ" ] || (echo "No combined-efi img.gz found" && exit 1)

          gunzip -kf "$IMG_GZ"
          IMG_RAW="${IMG_GZ%.gz}"

          OWRT_VER="${{ steps.vars.outputs.owrt_ver }}"
          TAG="${{ steps.vars.outputs.tag }}"
          BASE_NAME="openwrt-${OWRT_VER}-clashforge-${TAG}-24.10-ipk-x86_64"

          qemu-img convert -f raw -O vhdx "$IMG_RAW" "work/${BASE_NAME}.vhdx"
          qemu-img convert -f raw -O vpc "$IMG_RAW" "work/${BASE_NAME}.vhd"

          cp "$IMG_GZ" "work/${BASE_NAME}.img.gz"
          (cd work && sha256sum "${BASE_NAME}.img.gz" "${BASE_NAME}.vhdx" "${BASE_NAME}.vhd" > "${BASE_NAME}.sha256")
          ls -lh "work/${BASE_NAME}."*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hyperv-24.10-ipk
          path: |
            work/*.img.gz
            work/*.vhdx
            work/*.vhd
            work/*.sha256
          retention-days: 14

  build-25-apk:
    name: Build Hyper-V Image (25.12-apk)
    runs-on: ubuntu-latest
    needs: resolve-openwrt
    if: ${{ github.event.inputs.tracks == 'both' || github.event.inputs.tracks == '25.12-apk' }}
    permissions:
      contents: read

    steps:
      - name: Install host deps
        run: |
          sudo apt-get update
          sudo apt-get install -y jq zstd qemu-utils

      - name: Resolve build variables
        id: vars
        env:
          INPUT_TAG: ${{ github.event.inputs.clashforge_version }}
          INPUT_OWRT: ${{ github.event.inputs.openwrt_25_version }}
          FALLBACK_OWRT: ${{ needs.resolve-openwrt.outputs.stable }}
        run: |
          if [ -n "$INPUT_OWRT" ]; then
            OWRT_VER="$INPUT_OWRT"
          else
            OWRT_VER="$FALLBACK_OWRT"
          fi

          if [ "$INPUT_TAG" = "latest" ] || [ -z "$INPUT_TAG" ]; then
            TAG="$(gh api repos/${GITHUB_REPOSITORY}/releases/latest --jq '.tag_name')"
          else
            TAG="$INPUT_TAG"
          fi

          PKG_VER="${TAG#v}"
          PKG_FILE="clashforge-${PKG_VER}-r1_x86_64.apk"
          TRACK="25.12-apk"

          echo "owrt_ver=$OWRT_VER" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "pkg_file=$PKG_FILE" >> "$GITHUB_OUTPUT"
          echo "track=$TRACK" >> "$GITHUB_OUTPUT"

      - name: Download ClashForge package asset
        run: |
          mkdir -p work/pkg
          gh release download "${{ steps.vars.outputs.tag }}" \
            --pattern "${{ steps.vars.outputs.pkg_file }}" \
            --dir work/pkg \
            --clobber
          ls -lh work/pkg

      - name: Download OpenWrt ImageBuilder
        run: |
          mkdir -p work
          OWRT_VER="${{ steps.vars.outputs.owrt_ver }}"
          BASE="https://downloads.openwrt.org/releases/${OWRT_VER}/targets/x86/64"
          IB="openwrt-imagebuilder-${OWRT_VER}-x86-64.Linux-x86_64.tar.zst"
          curl -fsSL -o "work/${IB}" "${BASE}/${IB}"
          tar --zstd -xf "work/${IB}" -C work
          ls -1 work | grep '^openwrt-imagebuilder-' | head -1

      - name: Build OpenWrt image with ClashForge
        run: |
          IB_DIR="$(ls -1d work/openwrt-imagebuilder-* | head -1)"
          cp "work/pkg/${{ steps.vars.outputs.pkg_file }}" "$IB_DIR/packages/"

          pushd "$IB_DIR"
          make package_index
          make image PROFILE=generic PACKAGES="clashforge"
          popd

      - name: Convert to Hyper-V disks
        run: |
          IB_DIR="$(ls -1d work/openwrt-imagebuilder-* | head -1)"
          OUT_DIR="${IB_DIR}/bin/targets/x86/64"

          IMG_GZ="$(ls "$OUT_DIR"/*generic-ext4-combined-efi.img.gz 2>/dev/null | head -1)"
          if [ -z "$IMG_GZ" ]; then
            IMG_GZ="$(ls "$OUT_DIR"/*combined-efi*.img.gz | head -1)"
          fi
          [ -n "$IMG_GZ" ] || (echo "No combined-efi img.gz found" && exit 1)

          gunzip -kf "$IMG_GZ"
          IMG_RAW="${IMG_GZ%.gz}"

          OWRT_VER="${{ steps.vars.outputs.owrt_ver }}"
          TAG="${{ steps.vars.outputs.tag }}"
          BASE_NAME="openwrt-${OWRT_VER}-clashforge-${TAG}-25.12-apk-x86_64"

          qemu-img convert -f raw -O vhdx "$IMG_RAW" "work/${BASE_NAME}.vhdx"
          qemu-img convert -f raw -O vpc "$IMG_RAW" "work/${BASE_NAME}.vhd"

          cp "$IMG_GZ" "work/${BASE_NAME}.img.gz"
          (cd work && sha256sum "${BASE_NAME}.img.gz" "${BASE_NAME}.vhdx" "${BASE_NAME}.vhd" > "${BASE_NAME}.sha256")
          ls -lh "work/${BASE_NAME}."*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hyperv-25.12-apk
          path: |
            work/*.img.gz
            work/*.vhdx
            work/*.vhd
            work/*.sha256
          retention-days: 14
