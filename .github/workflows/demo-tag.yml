name: "[Demo] 3 — Tag on Merge"

# Step 3 of 3 (first half): Create and push a version tag whenever main moves,
# then dispatch the release workflow.
#
# Normal demo path:
#   demo-auto-merge.yml enables GitHub native auto-merge. GitHub performs the
#   actual merge after required checks pass, which creates a normal push to main.
#   This workflow listens to that push and tags the merge commit.
#
# Fallback paths:
#   pull_request_target.closed also handles PR merges that surface as PR-close
#   events. workflow_dispatch gives a manual backfill path for any commit SHA.
#
# Why explicit dispatch instead of relying on push:tags: in demo-release.yml?
#   Tags pushed by GITHUB_TOKEN do not trigger on:push:tags: in other workflows
#   (GitHub Actions recursion guard). We dispatch demo-release.yml explicitly
#   via gh workflow run after the tag is pushed.

on:
  push:
    branches: [main]
  pull_request_target:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: 'Commit SHA to tag (leave empty for HEAD)'
        required: false
        default: ''

concurrency:
  group: demo-tag-${{ github.event.pull_request.merge_commit_sha || github.event.inputs.sha || github.sha }}
  cancel-in-progress: false

jobs:
  create-tag:
    name: Create and push tag
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request_target' && github.event.pull_request.merged == true)
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve target commit
        id: target
        run: |
          set -euo pipefail
          echo "========================================="
          echo " [Demo Tag] Step 1 — Resolve commit"
          echo "========================================="

          if [ "${{ github.event_name }}" = "pull_request_target" ]; then
            SHA="${{ github.event.pull_request.merge_commit_sha }}"
            echo "  Trigger : merged PR #${{ github.event.pull_request.number }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            SHA="${{ github.sha }}"
            echo "  Trigger : push to main"
          else
            INPUT_SHA="${{ github.event.inputs.sha }}"
            SHA="${INPUT_SHA:-${{ github.sha }}}"
            echo "  Trigger : workflow_dispatch"
          fi

          echo "  SHA     : $SHA"
          git fetch origin main --tags --force
          git cat-file -e "$SHA^{commit}" || { git fetch origin "$SHA"; }

          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Check if already tagged
        id: check
        run: |
          set -euo pipefail
          echo ""
          echo " [Demo Tag] Step 2 — Check existing tags"
          git fetch origin --tags --force
          EXISTING=$(git tag --points-at "${{ steps.target.outputs.sha }}" \
            --list 'demo-v*' | sort -V | tail -1 || true)

          if [ -n "$EXISTING" ]; then
            echo "  ⏭️  Already tagged as $EXISTING — nothing to do"
            echo "skip=true"  >> "$GITHUB_OUTPUT"
            echo "tag=$EXISTING" >> "$GITHUB_OUTPUT"
          else
            echo "  No existing demo tag on this commit"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next tag
        id: next
        if: steps.check.outputs.skip != 'true'
        run: |
          set -euo pipefail
          echo ""
          echo " [Demo Tag] Step 3 — Compute next tag"
          LATEST=$(git tag --list 'demo-v*' --sort=-version:refname \
            | grep -E '^demo-v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || true)
          echo "  Latest demo tag: ${LATEST:-(none)}"

          if [ -z "$LATEST" ]; then
            NEXT="demo-v0.0.1"
          else
            MAJOR=$(echo "$LATEST" | sed 's/demo-v//' | cut -d. -f1)
            MINOR=$(echo "$LATEST" | cut -d. -f2)
            PATCH=$(echo "$LATEST" | cut -d. -f3)
            NEXT="demo-v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          echo "  Next tag: $NEXT"
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Push tag
        if: steps.check.outputs.skip != 'true'
        run: |
          set -euo pipefail
          echo ""
          echo " [Demo Tag] Step 4 — Push tag"
          TAG="${{ steps.next.outputs.tag }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG" "${{ steps.target.outputs.sha }}" -m "Demo release $TAG"
          git push origin "$TAG"
          echo "  ✅ Pushed $TAG → ${{ steps.target.outputs.sha }}"

      - name: Dispatch release workflow
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo ""
          echo " [Demo Tag] Step 5 — Dispatch demo-release.yml"
          TAG="${{ steps.next.outputs.tag }}"
          gh workflow run demo-release.yml \
            --ref "$TAG" \
            --field tag="$TAG"
          echo "  ✅ Dispatched demo-release.yml for $TAG"
          echo ""
          echo "Pipeline: PR merged → tag $TAG pushed → release dispatched ✓"
