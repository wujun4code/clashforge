name: Build & Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g. v0.1.0)'
        required: false
        default: 'dev'

jobs:
  # ────────────────────────────────────────────────────────────
  # Stage 1: Build React UI (once, shared across all platforms)
  # ────────────────────────────────────────────────────────────
  build-ui:
    name: Build React UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: cd ui && npm ci

      - name: Build UI
        run: cd ui && npm run build

      - name: Upload UI artifact
        uses: actions/upload-artifact@v7
        with:
          name: ui-dist
          path: ui/dist/
          retention-days: 1  # temp artifact, only needed between jobs

  # ────────────────────────────────────────────────────────────
  # Stage 2: Build Go binaries for each target platform
  # ────────────────────────────────────────────────────────────
  build-binaries:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: build-ui

    strategy:
      matrix:
        include:
          # x86_64 (PC router / VM / x86 OpenWrt)
          - name: x86_64
            goos: linux
            goarch: amd64
            suffix: linux-amd64
            openwrt_arch: x86_64

          # ARMv8 / AArch64 — Cortex-A53/A55/A72 etc.
          # Covers: Raspberry Pi 3/4, NanoPi R4S/R5S, Rockchip, MediaTek MT7986 ...
          - name: aarch64
            goos: linux
            goarch: arm64
            suffix: linux-arm64
            openwrt_arch: aarch64_generic

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Download UI dist
        uses: actions/download-artifact@v8
        with:
          name: ui-dist
          path: internal/api/ui_dist/

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ] && echo "${{ github.ref }}" | grep -q "refs/tags/"; then
            VERSION="${{ github.ref_name }}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Build clashforge binary
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w -X main.buildVersion=${{ steps.version.outputs.version }}" \
            -o dist/clashforge-${{ matrix.suffix }} \
            ./cmd/clashforge

      - name: Verify binary
        run: |
          file dist/clashforge-${{ matrix.suffix }}
          ls -lh dist/clashforge-${{ matrix.suffix }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: clashforge-${{ matrix.suffix }}
          path: dist/clashforge-${{ matrix.suffix }}
          retention-days: 7

  # ────────────────────────────────────────────────────────────
  # Stage 3: Package OpenWrt IPK for each platform
  # ────────────────────────────────────────────────────────────
  package-ipk:
    name: Package IPK ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: build-binaries

    strategy:
      matrix:
        include:
          - name: x86_64
            suffix: linux-amd64
            pkg_arch: x86_64
            mihomo_asset: mihomo-linux-amd64-compatible

          # Generic aarch64 (Cortex-A72, A73, A55 on some devices)
          - name: aarch64_generic
            suffix: linux-arm64
            pkg_arch: aarch64_generic
            mihomo_asset: mihomo-linux-arm64

          # Cortex-A53 — very common: Raspberry Pi 3, MT7622, MT7981, MT7986...
          - name: aarch64_cortex-a53
            suffix: linux-arm64
            pkg_arch: aarch64_cortex-a53
            mihomo_asset: mihomo-linux-arm64

    steps:
      - uses: actions/checkout@v5

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ] && echo "${{ github.ref }}" | grep -q "refs/tags/"; then
            VERSION="${{ github.ref_name }}"
            PKG_VERSION="${VERSION#v}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
            PKG_VERSION="${VERSION#v}"
          else
            SHORT=$(git rev-parse --short HEAD)
            VERSION="dev-$SHORT"
            PKG_VERSION="0.0.1+$SHORT"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "pkg_version=$PKG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Download binary
        uses: actions/download-artifact@v8
        with:
          name: clashforge-${{ matrix.suffix }}
          path: dist/

      - name: Download bundled mihomo
        run: |
          MIHOMO_VER=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest \
            | grep '"tag_name"' | head -1 | cut -d'"' -f4)
          echo "Downloading mihomo $MIHOMO_VER for ${{ matrix.mihomo_asset }}"
          curl -L -o /tmp/mihomo.gz \
            "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VER}/${{ matrix.mihomo_asset }}-${MIHOMO_VER}.gz"
          gunzip /tmp/mihomo.gz
          chmod +x /tmp/mihomo
          echo "mihomo version: $(/tmp/mihomo -v 2>&1 | head -1)"

      - name: Build IPK
        run: |
          VERSION="${{ steps.version.outputs.pkg_version }}"
          ARCH="${{ matrix.pkg_arch }}"
          PKG_NAME="clashforge_${VERSION}_${ARCH}.ipk"
          export PKG_NAME

          # Create IPK directory structure
          mkdir -p ipk/CONTROL
          mkdir -p ipk/usr/bin
          mkdir -p ipk/etc/metaclash
          mkdir -p ipk/etc/init.d
          mkdir -p ipk/usr/share/metaclash
          mkdir -p ipk/usr/share/luci/menu.d
          mkdir -p "ipk/www/luci-static/resources/view/clashforge"
          mkdir -p ipk/usr/share/rpcd/acl.d

          # Copy clashforge binary
          cp dist/clashforge-${{ matrix.suffix }} ipk/usr/bin/clashforge
          chmod 755 ipk/usr/bin/clashforge

          # Bundle mihomo as mihomo-clashforge (won't conflict with system mihomo)
          cp /tmp/mihomo ipk/usr/bin/mihomo-clashforge
          chmod 755 ipk/usr/bin/mihomo-clashforge

          # Config example files (reference only, not used by postinst)
          # mkdir -p ipk/etc/metaclash  # already created above

          # LuCI navigation entry (adds ClashForge to Services menu)
          cp openwrt/files/usr/share/luci/menu.d/luci-app-clashforge.json \
             ipk/usr/share/luci/menu.d/luci-app-clashforge.json
          cp openwrt/files/www/luci-static/resources/view/clashforge/main.js \
             "ipk/www/luci-static/resources/view/clashforge/main.js"
          cp openwrt/files/usr/share/rpcd/acl.d/luci-app-clashforge.json \
             ipk/usr/share/rpcd/acl.d/luci-app-clashforge.json

          # init.d script (smart mihomo detection)
          cp openwrt/files/etc/init.d/metaclash ipk/etc/init.d/clashforge
          chmod 755 ipk/etc/init.d/clashforge

          # control file
          MIHOMO_VER=$(/tmp/mihomo -v 2>&1 | grep -o 'v[0-9][^ ]*' | head -1 || echo 'unknown')
          cat > ipk/CONTROL/control << EOF
          Package: clashforge
          Version: ${VERSION}
          Architecture: ${ARCH}
          Maintainer: wujun4code
          Section: net
          Priority: optional
          Depends: ca-bundle, ip-full
          Source: https://github.com/wujun4code/clashforge
          Description: Mihomo (Clash.Meta) proxy manager for OpenWrt.
           Includes bundled mihomo ${MIHOMO_VER}. Auto-detects system mihomo if present.
           Web UI on port 7777. Zero configuration required after install.
          EOF

          # conffiles — intentionally empty
          # We manage config files manually in postinst to avoid opkg sha256 errors
          touch ipk/CONTROL/conffiles

          # postinst — use the dedicated script
          cp openwrt/files/etc/metaclash/postinst.sh ipk/CONTROL/postinst
          chmod 755 ipk/CONTROL/postinst

          # prerm
          cat > ipk/CONTROL/prerm << 'PRERM'
          #!/bin/sh
          # Stop service
          /etc/init.d/clashforge stop 2>/dev/null || true
          /etc/init.d/clashforge disable 2>/dev/null || true
          # Kill any lingering processes
          pkill -f '/usr/bin/clashforge' 2>/dev/null || true
          pkill -f 'mihomo-clashforge' 2>/dev/null || true
          sleep 1
          # Clean up runtime files
          rm -f /var/run/metaclash/metaclash.pid
          rm -f /var/run/metaclash/mihomo.pid
          PRERM
          chmod 755 ipk/CONTROL/prerm

          # Build the IPK using the dedicated packaging script
          python3 scripts/build_ipk.py
          ls -lh "$PKG_NAME"
          echo "pkg_name=$PKG_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload IPK artifact
        uses: actions/upload-artifact@v7
        with:
          name: ipk-${{ matrix.name }}-${{ steps.version.outputs.version }}
          path: "*.ipk"
          retention-days: 30

  # ────────────────────────────────────────────────────────────
  # Stage 4: Create GitHub Release (only on tag push)
  # ────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: package-ipk
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Download all IPK artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: ipk-*
          path: release-assets/
          merge-multiple: true

      - name: List release assets
        run: ls -lh release-assets/

      - name: Create checksums
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "ClashForge ${{ github.ref_name }}"
          body: |
            ## ClashForge ${{ github.ref_name }}

            Mihomo (Clash.Meta) proxy manager for OpenWrt — single static binary with embedded Web UI.

            ### Installation on OpenWrt

            #### x86_64
            ```sh
            opkg install clashforge_*_x86_64.ipk
            ```

            #### AArch64 (ARMv8, Cortex-A53/A55/A72)
            ```sh
            opkg install clashforge_*_aarch64_generic.ipk
            ```

            ### After installation
            ```sh
            # Edit config
            vi /etc/metaclash/config.toml

            # Start
            /etc/init.d/clashforge start

            # Access Web UI
            http://<router-ip>:7777
            ```

            ### Manual binary install
            Download `clashforge-linux-amd64` or `clashforge-linux-arm64`, copy to `/usr/bin/clashforge`, `chmod +x`.

            ### Checksums
            See `SHA256SUMS.txt`.
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: |
            release-assets/*.ipk
            release-assets/SHA256SUMS.txt
