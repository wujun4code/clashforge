name: Build & Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g. v0.1.0)'
        required: false
        default: 'dev'

jobs:
  # ────────────────────────────────────────────────────────────
  # Stage 1: Build React UI (once, shared across all platforms)
  # ────────────────────────────────────────────────────────────
  build-ui:
    name: Build React UI
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Compute version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ] && echo "${{ github.ref }}" | grep -q "refs/tags/"; then
            VERSION="${{ github.ref_name }}"
          elif [ -n "${{ github.event.inputs.version }}" ] && [ "${{ github.event.inputs.version }}" != "dev" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: cd ui && npm ci

      - name: Build UI
        env:
          VITE_APP_VERSION: ${{ steps.version.outputs.version }}
        run: cd ui && npm run build

      - name: Upload UI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/
          retention-days: 1

  # ────────────────────────────────────────────────────────────
  # Stage 2: Build Go binaries
  # One binary per Go arch (amd64 + arm64); both aarch64 IPK
  # variants share the same arm64 binary.
  # ────────────────────────────────────────────────────────────
  build-binaries:
    name: Build binary (${{ matrix.suffix }})
    runs-on: ubuntu-latest
    needs: build-ui

    strategy:
      matrix:
        include:
          - suffix: linux-amd64
            goos: linux
            goarch: amd64

          - suffix: linux-arm64
            goos: linux
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Download UI dist
        uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: internal/api/ui_dist/

      - name: Build clashforge binary
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w -X main.buildVersion=${{ needs.build-ui.outputs.version }}" \
            -o dist/clashforge-${{ matrix.suffix }} \
            ./cmd/clashforge

      - name: Verify binary
        run: |
          file dist/clashforge-${{ matrix.suffix }}
          ls -lh dist/clashforge-${{ matrix.suffix }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.suffix }}
          path: dist/clashforge-${{ matrix.suffix }}
          retention-days: 1

  # ────────────────────────────────────────────────────────────
  # Stage 3: Package OpenWrt IPK for each platform
  # ────────────────────────────────────────────────────────────
  package-ipk:
    name: Package IPK (${{ matrix.pkg_arch }})
    runs-on: ubuntu-latest
    needs: [build-ui, build-binaries]

    strategy:
      matrix:
        include:
          - pkg_arch: x86_64
            binary_suffix: linux-amd64
            mihomo_asset: mihomo-linux-amd64-compatible

          - pkg_arch: aarch64_generic
            binary_suffix: linux-arm64
            mihomo_asset: mihomo-linux-arm64

          - pkg_arch: aarch64_cortex-a53
            binary_suffix: linux-arm64
            mihomo_asset: mihomo-linux-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Compute pkg version
        id: version
        run: |
          RAW="${{ needs.build-ui.outputs.version }}"
          PKG_VERSION="${RAW#v}"
          echo "tag=$RAW" >> "$GITHUB_OUTPUT"
          echo "pkg_version=$PKG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Download clashforge binary
        uses: actions/download-artifact@v4
        with:
          name: binary-${{ matrix.binary_suffix }}
          path: dist/

      - name: Download bundled mihomo
        run: |
          MIHOMO_VER=$(curl -sfL -H "Accept: application/vnd.github+json" https://api.github.com/repos/MetaCubeX/mihomo/releases/latest \
            | grep '"tag_name"' | head -1 | cut -d'"' -f4)
          echo "Downloading mihomo $MIHOMO_VER (${{ matrix.mihomo_asset }})"
          curl -fsSL -o /tmp/mihomo.gz \
            "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VER}/${{ matrix.mihomo_asset }}-${MIHOMO_VER}.gz"
          gunzip /tmp/mihomo.gz
          chmod +x /tmp/mihomo
          echo "mihomo: $(/tmp/mihomo -v 2>&1 | head -1)"
          echo "MIHOMO_VER=$MIHOMO_VER" >> "$GITHUB_ENV"

      - name: Build IPK
        run: |
          VERSION="${{ steps.version.outputs.pkg_version }}"
          ARCH="${{ matrix.pkg_arch }}"
          PKG_NAME="clashforge_${VERSION}_${ARCH}.ipk"
          export PKG_NAME

          # Staging tree
          mkdir -p ipk/CONTROL
          mkdir -p ipk/usr/bin
          mkdir -p ipk/etc/init.d
          mkdir -p ipk/usr/share/metaclash
          mkdir -p ipk/usr/share/luci/menu.d
          mkdir -p ipk/www/luci-static/resources/view/clashforge
          mkdir -p ipk/usr/share/rpcd/acl.d

          # Binaries
          cp dist/clashforge-${{ matrix.binary_suffix }} ipk/usr/bin/clashforge
          chmod 755 ipk/usr/bin/clashforge
          cp /tmp/mihomo ipk/usr/bin/mihomo-clashforge
          chmod 755 ipk/usr/bin/mihomo-clashforge

          # LuCI / rpcd files
          cp openwrt/files/usr/share/luci/menu.d/luci-app-clashforge.json \
             ipk/usr/share/luci/menu.d/luci-app-clashforge.json
          cp openwrt/files/www/luci-static/resources/view/clashforge/main.js \
             ipk/www/luci-static/resources/view/clashforge/main.js
          cp openwrt/files/usr/share/rpcd/acl.d/luci-app-clashforge.json \
             ipk/usr/share/rpcd/acl.d/luci-app-clashforge.json

          # init.d
          cp openwrt/files/etc/init.d/metaclash ipk/etc/init.d/clashforge
          chmod 755 ipk/etc/init.d/clashforge

          # uninstall helper
          cp openwrt/files/etc/metaclash/uninstall-clashforge.sh ipk/usr/bin/uninstall-clashforge
          chmod 755 ipk/usr/bin/uninstall-clashforge

          # diagnostic tool
          cp openwrt/files/usr/bin/clashforge-diag ipk/usr/bin/clashforge-diag
          chmod 755 ipk/usr/bin/clashforge-diag

          # CONTROL/control — no leading whitespace, opkg is strict
          MIHOMO_VER_CLEAN="${MIHOMO_VER:-unknown}"
          cat > ipk/CONTROL/control <<EOF
          Package: clashforge
          Version: ${VERSION}
          Architecture: ${ARCH}
          Maintainer: wujun4code
          Section: net
          Priority: optional
          Depends: ca-bundle, ip-full
          Source: https://github.com/wujun4code/clashforge
          Description: Mihomo (Clash.Meta) proxy manager for OpenWrt.
           Includes bundled mihomo ${MIHOMO_VER_CLEAN}. Web UI on port 7777.
          EOF
          # Strip leading whitespace that heredoc may add
          sed -i 's/^[[:space:]]*//' ipk/CONTROL/control

          touch ipk/CONTROL/conffiles

          cp openwrt/files/etc/metaclash/postinst.sh ipk/CONTROL/postinst
          chmod 755 ipk/CONTROL/postinst
          cp openwrt/files/etc/metaclash/prerm.sh ipk/CONTROL/prerm
          chmod 755 ipk/CONTROL/prerm
          cp openwrt/files/etc/metaclash/postrm.sh ipk/CONTROL/postrm
          chmod 755 ipk/CONTROL/postrm

          python3 scripts/build_ipk.py
          ls -lh "$PKG_NAME"
          echo "pkg_name=$PKG_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload IPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipk-${{ matrix.pkg_arch }}
          path: "*.ipk"
          retention-days: 7

  # ────────────────────────────────────────────────────────────
  # Stage 4: Collect install.sh (single upload, from checkout)
  # ────────────────────────────────────────────────────────────
  upload-installer:
    name: Upload install.sh
    runs-on: ubuntu-latest
    needs: build-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: installer
          path: scripts/install.sh
          retention-days: 7

  # ────────────────────────────────────────────────────────────
  # Stage 5: Create GitHub Release (tag pushes only)
  # ────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-ui, package-ipk, upload-installer]
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Compute pkg version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            TAG="${{ github.event.inputs.version }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "pkg_version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download IPK artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ipk-*
          path: release-assets/
          merge-multiple: true

      - name: Download install.sh
        uses: actions/download-artifact@v4
        with:
          name: installer
          path: release-assets/

      - name: List release assets
        run: ls -lh release-assets/

      - name: Create checksums
        run: |
          cd release-assets
          sha256sum *.ipk install.sh > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "ClashForge ${{ steps.ver.outputs.tag }}"
          body: |
            ## ClashForge ${{ steps.ver.outputs.tag }}

            Mihomo (Clash.Meta) 透明代理管理器，适用于 OpenWrt — 单二进制文件，内嵌 Web UI。

            ---

            ### 一键安装 / One-liner install

            SSH 进入路由器后执行，**自动检测 CPU 架构**，自动下载并安装最新版：

            ```sh
            wget -qO- https://raw.githubusercontent.com/wujun4code/clashforge/main/scripts/install.sh | sh
            ```

            **🇨🇳 国内加速（GitHub 连接不稳定时使用）：**
            ```sh
            wget -qO- https://ghproxy.com/https://raw.githubusercontent.com/wujun4code/clashforge/main/scripts/install.sh | sh
            ```
            > 安装脚本会自动尝试多个镜像加速源，无需额外设置。
            > 也可手动指定镜像：`sh install.sh --mirror https://ghproxy.com`

            **安装本版本（${{ steps.ver.outputs.tag }}）：**
            ```sh
            wget -qO- https://raw.githubusercontent.com/wujun4code/clashforge/main/scripts/install.sh | sh -s -- --version ${{ steps.ver.outputs.tag }}
            ```

            **全新安装（清除旧版所有残留后重装）：**
            ```sh
            wget -qO- https://raw.githubusercontent.com/wujun4code/clashforge/main/scripts/install.sh | sh -s -- --purge
            ```

            > 💡 安装脚本地址固定，无需随版本更新

            ---

            ### 🌩️ 通过 Cloudflare R2 托管安装（Fork 用户）

            如果你 fork 了本仓库并配置了自己的 Cloudflare R2 存储，可以使用自定义域名直接安装，无需依赖 GitHub：

            ```sh
            wget -qO- https://raw.githubusercontent.com/wujun4code/clashforge/main/scripts/install.sh | \
              sh -s -- --base-url https://releases.example.com
            ```

            安装指定版本：
            ```sh
            wget -qO- https://raw.githubusercontent.com/wujun4code/clashforge/main/scripts/install.sh | \
              sh -s -- --base-url https://releases.example.com --version ${{ steps.ver.outputs.tag }}
            ```

            > 将 `https://releases.example.com` 替换为你在 R2 bucket 上绑定的自定义域名。
            > R2 配置方法参见：[Fork 后配置自己的 Cloudflare R2 下载加速](https://github.com/wujun4code/clashforge/blob/main/docs/guides/fork-r2-setup.md)

            ---

            ### 手动安装 IPK

            先下载对应架构的 IPK，再通过 opkg 安装（`--nodeps` 跳过依赖检查，因 mihomo 已打包在内）：

            #### x86_64（PC 路由 / x86 OpenWrt）
            ```sh
            wget https://github.com/wujun4code/clashforge/releases/download/${{ steps.ver.outputs.tag }}/clashforge_${{ steps.ver.outputs.pkg_version }}_x86_64.ipk
            opkg install --nodeps clashforge_${{ steps.ver.outputs.pkg_version }}_x86_64.ipk
            ```

            #### AArch64 通用（Cortex-A72/A73/A55，NanoPi R4S/R5S 等）
            ```sh
            wget https://github.com/wujun4code/clashforge/releases/download/${{ steps.ver.outputs.tag }}/clashforge_${{ steps.ver.outputs.pkg_version }}_aarch64_generic.ipk
            opkg install --nodeps clashforge_${{ steps.ver.outputs.pkg_version }}_aarch64_generic.ipk
            ```

            #### AArch64 Cortex-A53（Raspberry Pi 3, MT7981/MT7986/MT7622 等）
            ```sh
            wget https://github.com/wujun4code/clashforge/releases/download/${{ steps.ver.outputs.tag }}/clashforge_${{ steps.ver.outputs.pkg_version }}_aarch64_cortex-a53.ipk
            opkg install --nodeps clashforge_${{ steps.ver.outputs.pkg_version }}_aarch64_cortex-a53.ipk
            ```

            ---

            ### 安装完成后

            ```sh
            # Web UI（浏览器打开）
            http://<路由器IP>:7777

            # 查看运行状态
            /etc/init.d/clashforge status

            # 编辑配置（通常不需要手动编辑，通过 Web UI 操作即可）
            vi /etc/metaclash/config.toml
            ```

            ### 卸载

            ```sh
            opkg remove clashforge
            # 或完全清除（含配置和数据）：
            uninstall-clashforge
            ```

            ---

            ### SHA256 校验

            见附件 `SHA256SUMS.txt`
          draft: false
          prerelease: ${{ contains(steps.ver.outputs.tag, 'alpha') || contains(steps.ver.outputs.tag, 'beta') || contains(steps.ver.outputs.tag, 'rc') }}
          files: |
            release-assets/*.ipk
            release-assets/install.sh
            release-assets/SHA256SUMS.txt
