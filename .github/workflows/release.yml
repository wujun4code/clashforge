name: Build & Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g. v0.1.0-beta.1)'
        required: false
        default: 'dev'

jobs:
  # ────────────────────────────────────────────────────────────
  # Stage 1: Build React UI (once, shared across all platforms)
  # ────────────────────────────────────────────────────────────
  build-ui:
    name: Build React UI
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Compute version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ] && echo "${{ github.ref }}" | grep -q "refs/tags/"; then
            VERSION="${{ github.ref_name }}"
          elif [ -n "${{ github.event.inputs.version }}" ] && [ "${{ github.event.inputs.version }}" != "dev" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: cd ui && npm ci

      - name: Build UI
        env:
          VITE_APP_VERSION: ${{ steps.version.outputs.version }}
        run: cd ui && npm run build

      - name: Upload UI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/
          retention-days: 1

  # ────────────────────────────────────────────────────────────
  # Stage 2: Build Go binaries
  # One binary per Go arch (amd64 + arm64); both aarch64 IPK
  # variants share the same arm64 binary.
  # ────────────────────────────────────────────────────────────
  build-binaries:
    name: Build binary (${{ matrix.suffix }})
    runs-on: ubuntu-latest
    needs: build-ui

    strategy:
      matrix:
        include:
          - suffix: linux-amd64
            goos: linux
            goarch: amd64

          - suffix: linux-arm64
            goos: linux
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Download UI dist
        uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: internal/api/ui_dist/

      - name: Build clashforge binary
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w -X main.buildVersion=${{ needs.build-ui.outputs.version }}" \
            -o dist/clashforge-${{ matrix.suffix }} \
            ./cmd/clashforge

      - name: Verify binary
        run: |
          file dist/clashforge-${{ matrix.suffix }}
          ls -lh dist/clashforge-${{ matrix.suffix }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.suffix }}
          path: dist/clashforge-${{ matrix.suffix }}
          retention-days: 1

  # ────────────────────────────────────────────────────────────
  # Stage 2.5: Download latest GeoData files once, reused by all packages
  # ────────────────────────────────────────────────────────────
  download-geodata:
    name: Download GeoData files
    runs-on: ubuntu-latest
    needs: build-ui
    steps:
      - name: Download geodata files
        run: |
          mkdir -p geodata

          download_file() {
            local name="$1" dest="$2"; shift 2
            for url in "$@"; do
              echo "  → trying $url"
              if curl -fsSL --max-time 120 -o "$dest" "$url"; then
                echo "  ✓ $name  $(du -sh "$dest" | cut -f1)"
                return 0
              fi
              echo "  ✗ failed, trying next mirror…"
            done
            echo "ERROR: all mirrors failed for $name" >&2
            return 1
          }

          download_file country.mmdb geodata/country.mmdb \
            "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country.mmdb" \
            "https://cdn.jsdmirror.com/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"

          download_file GeoIP.dat geodata/GeoIP.dat \
            "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.dat" \
            "https://cdn.jsdmirror.com/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"

          download_file GeoSite.dat geodata/GeoSite.dat \
            "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat" \
            "https://cdn.jsdmirror.com/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"

          ls -lh geodata/

      - name: Upload geodata artifact
        uses: actions/upload-artifact@v4
        with:
          name: geodata
          path: geodata/
          retention-days: 1

  # ────────────────────────────────────────────────────────────
  # Stage 3: Package OpenWrt IPK for each platform
  # ────────────────────────────────────────────────────────────
  package-ipk:
    name: Package IPK (${{ matrix.pkg_arch }})
    runs-on: ubuntu-latest
    needs: [build-ui, build-binaries, download-geodata]

    strategy:
      matrix:
        include:
          - pkg_arch: x86_64
            binary_suffix: linux-amd64
            mihomo_asset: mihomo-linux-amd64-compatible

          - pkg_arch: aarch64_generic
            binary_suffix: linux-arm64
            mihomo_asset: mihomo-linux-arm64

          - pkg_arch: aarch64_cortex-a53
            binary_suffix: linux-arm64
            mihomo_asset: mihomo-linux-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Compute pkg version
        id: version
        run: |
          RAW="${{ needs.build-ui.outputs.version }}"
          PKG_VERSION="${RAW#v}"
          echo "tag=$RAW" >> "$GITHUB_OUTPUT"
          echo "pkg_version=$PKG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Download clashforge binary
        uses: actions/download-artifact@v4
        with:
          name: binary-${{ matrix.binary_suffix }}
          path: dist/

      - name: Download bundled mihomo
        run: |
          MIHOMO_VER=$(curl -sfL -H "Accept: application/vnd.github+json" https://api.github.com/repos/MetaCubeX/mihomo/releases/latest \
            | grep '"tag_name"' | head -1 | cut -d'"' -f4)
          echo "Downloading mihomo $MIHOMO_VER (${{ matrix.mihomo_asset }})"
          curl -fsSL -o /tmp/mihomo.gz \
            "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VER}/${{ matrix.mihomo_asset }}-${MIHOMO_VER}.gz"
          gunzip /tmp/mihomo.gz
          chmod +x /tmp/mihomo
          echo "mihomo: $(/tmp/mihomo -v 2>&1 | head -1)"
          echo "MIHOMO_VER=$MIHOMO_VER" >> "$GITHUB_ENV"

      - name: Download geodata artifact
        uses: actions/download-artifact@v4
        with:
          name: geodata
          path: geodata/

      - name: Build IPK
        run: |
          VERSION="${{ steps.version.outputs.pkg_version }}"
          ARCH="${{ matrix.pkg_arch }}"
          PKG_NAME="clashforge_${VERSION}_${ARCH}.ipk"
          export PKG_NAME

          # Staging tree
          mkdir -p ipk/CONTROL
          mkdir -p ipk/usr/bin
          mkdir -p ipk/etc/init.d
          mkdir -p ipk/usr/share/metaclash
          mkdir -p ipk/usr/share/luci/menu.d
          mkdir -p ipk/www/luci-static/resources/view/clashforge
          mkdir -p ipk/usr/share/rpcd/acl.d

          # Bundle GeoData (postinst seeds these to /etc/metaclash on fresh install)
          cp geodata/country.mmdb ipk/usr/share/metaclash/country.mmdb
          cp geodata/GeoIP.dat    ipk/usr/share/metaclash/GeoIP.dat
          cp geodata/GeoSite.dat  ipk/usr/share/metaclash/GeoSite.dat
          echo "GeoData sizes:"
          ls -lh ipk/usr/share/metaclash/

          # Binaries
          cp dist/clashforge-${{ matrix.binary_suffix }} ipk/usr/bin/clashforge
          chmod 755 ipk/usr/bin/clashforge
          cp /tmp/mihomo ipk/usr/bin/mihomo-clashforge
          chmod 755 ipk/usr/bin/mihomo-clashforge

          # LuCI / rpcd files
          cp openwrt/files/usr/share/luci/menu.d/luci-app-clashforge.json \
             ipk/usr/share/luci/menu.d/luci-app-clashforge.json
          cp openwrt/files/www/luci-static/resources/view/clashforge/main.js \
             ipk/www/luci-static/resources/view/clashforge/main.js
          cp openwrt/files/usr/share/rpcd/acl.d/luci-app-clashforge.json \
             ipk/usr/share/rpcd/acl.d/luci-app-clashforge.json

          # init.d
          cp openwrt/files/etc/init.d/metaclash ipk/etc/init.d/clashforge
          chmod 755 ipk/etc/init.d/clashforge

          # uninstall helper
          cp openwrt/files/etc/metaclash/uninstall-clashforge.sh ipk/usr/bin/uninstall-clashforge
          chmod 755 ipk/usr/bin/uninstall-clashforge

          # diagnostic tool (optional; may be removed in some revisions)
          if [ -f openwrt/files/usr/bin/clashforge-diag ]; then
            cp openwrt/files/usr/bin/clashforge-diag ipk/usr/bin/clashforge-diag
            chmod 755 ipk/usr/bin/clashforge-diag
          else
            echo "[warn] openwrt/files/usr/bin/clashforge-diag not found, skip packaging diagnostic tool"
          fi

          # CONTROL/control — no leading whitespace, opkg is strict
          MIHOMO_VER_CLEAN="${MIHOMO_VER:-unknown}"
          cat > ipk/CONTROL/control <<EOF
          Package: clashforge
          Version: ${VERSION}
          Architecture: ${ARCH}
          Maintainer: wujun4code
          Section: net
          Priority: optional
          Depends: ca-bundle
          Source: https://github.com/wujun4code/clashforge
          Description: Mihomo (Clash.Meta) proxy manager for OpenWrt.
           Includes bundled mihomo ${MIHOMO_VER_CLEAN}. Web UI on port 7777.
          EOF
          # Strip leading whitespace that heredoc may add
          sed -i 's/^[[:space:]]*//' ipk/CONTROL/control

          touch ipk/CONTROL/conffiles

          cp openwrt/files/etc/metaclash/postinst.sh ipk/CONTROL/postinst
          chmod 755 ipk/CONTROL/postinst
          cp openwrt/files/etc/metaclash/prerm.sh ipk/CONTROL/prerm
          chmod 755 ipk/CONTROL/prerm
          cp openwrt/files/etc/metaclash/postrm.sh ipk/CONTROL/postrm
          chmod 755 ipk/CONTROL/postrm

          python3 scripts/build_ipk.py
          ls -lh "$PKG_NAME"
          echo "pkg_name=$PKG_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload IPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipk-${{ matrix.pkg_arch }}
          path: "*.ipk"
          retention-days: 7

  # ────────────────────────────────────────────────────────────
  # Stage 3.5: Package OpenWrt APK for each platform (25.12+)
  # ────────────────────────────────────────────────────────────
  package-apk:
    name: Package APK (${{ matrix.pkg_arch }})
    runs-on: ubuntu-latest
    needs: [build-ui, build-binaries, download-geodata]

    strategy:
      matrix:
        include:
          - pkg_arch: x86_64
            binary_suffix: linux-amd64
            mihomo_asset: mihomo-linux-amd64-compatible

          - pkg_arch: aarch64_generic
            binary_suffix: linux-arm64
            mihomo_asset: mihomo-linux-arm64

          - pkg_arch: aarch64_cortex-a53
            binary_suffix: linux-arm64
            mihomo_asset: mihomo-linux-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Compute pkg version
        id: version
        run: |
          RAW="${{ needs.build-ui.outputs.version }}"
          PKG_VERSION="${RAW#v}"
          # apk mkpkg --info version: requires numeric dot-separated segments (Alpine format).
          # We keep this only for the internal package metadata; filenames use PKG_VERSION.
          # Example: 0.1.0-beta.13 -> 0.1.0.13
          APK_INTERNAL_VERSION="$(printf '%s' "$PKG_VERSION" | sed -E 's/[^0-9]+/./g; s/[.]{2,}/./g; s/^[.]//; s/[.]$//')"
          [ -n "$APK_INTERNAL_VERSION" ] || APK_INTERNAL_VERSION="0"
          echo "tag=$RAW" >> "$GITHUB_OUTPUT"
          echo "pkg_version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "apk_internal_version=$APK_INTERNAL_VERSION" >> "$GITHUB_OUTPUT"

      - name: Download clashforge binary
        uses: actions/download-artifact@v4
        with:
          name: binary-${{ matrix.binary_suffix }}
          path: dist/

      - name: Download bundled mihomo
        run: |
          MIHOMO_VER=$(curl -sfL -H "Accept: application/vnd.github+json" https://api.github.com/repos/MetaCubeX/mihomo/releases/latest \
            | grep '"tag_name"' | head -1 | cut -d'"' -f4)
          echo "Downloading mihomo $MIHOMO_VER (${{ matrix.mihomo_asset }})"
          curl -fsSL -o /tmp/mihomo.gz \
            "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VER}/${{ matrix.mihomo_asset }}-${MIHOMO_VER}.gz"
          gunzip /tmp/mihomo.gz
          chmod +x /tmp/mihomo
          echo "mihomo: $(/tmp/mihomo -v 2>&1 | head -1)"
          echo "MIHOMO_VER=$MIHOMO_VER" >> "$GITHUB_ENV"

      - name: Download geodata artifact
        uses: actions/download-artifact@v4
        with:
          name: geodata
          path: geodata/

      - name: Build APK
        run: |
          ARCH="${{ matrix.pkg_arch }}"
          PKG_VERSION="${{ steps.version.outputs.pkg_version }}"
          APK_INTERNAL_VERSION="${{ steps.version.outputs.apk_internal_version }}"
          APK_NAME="clashforge_${PKG_VERSION}_${ARCH}.apk"
          MIHOMO_VER_CLEAN="${MIHOMO_VER:-unknown}"

          # Staging tree
          mkdir -p apk-root/usr/bin
          mkdir -p apk-root/etc/init.d
          mkdir -p apk-root/usr/share/metaclash
          mkdir -p apk-root/usr/share/luci/menu.d
          mkdir -p apk-root/www/luci-static/resources/view/clashforge
          mkdir -p apk-root/usr/share/rpcd/acl.d
          mkdir -p apk-root/lib/apk/packages
          mkdir -p apk-scripts

          # Bundle GeoData (postinst seeds these to /etc/metaclash on fresh install)
          cp geodata/country.mmdb apk-root/usr/share/metaclash/country.mmdb
          cp geodata/GeoIP.dat    apk-root/usr/share/metaclash/GeoIP.dat
          cp geodata/GeoSite.dat  apk-root/usr/share/metaclash/GeoSite.dat
          echo "GeoData sizes:"
          ls -lh apk-root/usr/share/metaclash/

          # Binaries
          cp dist/clashforge-${{ matrix.binary_suffix }} apk-root/usr/bin/clashforge
          chmod 755 apk-root/usr/bin/clashforge
          cp /tmp/mihomo apk-root/usr/bin/mihomo-clashforge
          chmod 755 apk-root/usr/bin/mihomo-clashforge

          # LuCI / rpcd files
          cp openwrt/files/usr/share/luci/menu.d/luci-app-clashforge.json \
             apk-root/usr/share/luci/menu.d/luci-app-clashforge.json
          cp openwrt/files/www/luci-static/resources/view/clashforge/main.js \
             apk-root/www/luci-static/resources/view/clashforge/main.js
          cp openwrt/files/usr/share/rpcd/acl.d/luci-app-clashforge.json \
             apk-root/usr/share/rpcd/acl.d/luci-app-clashforge.json

          # init.d + helper
          cp openwrt/files/etc/init.d/metaclash apk-root/etc/init.d/clashforge
          chmod 755 apk-root/etc/init.d/clashforge
          cp openwrt/files/etc/metaclash/uninstall-clashforge.sh apk-root/usr/bin/uninstall-clashforge
          chmod 755 apk-root/usr/bin/uninstall-clashforge

          # diagnostic tool (optional)
          if [ -f openwrt/files/usr/bin/clashforge-diag ]; then
            cp openwrt/files/usr/bin/clashforge-diag apk-root/usr/bin/clashforge-diag
            chmod 755 apk-root/usr/bin/clashforge-diag
          else
            echo "[warn] openwrt/files/usr/bin/clashforge-diag not found, skip packaging diagnostic tool"
          fi

          # Package lifecycle scripts
          cp openwrt/files/etc/metaclash/postinst.sh apk-scripts/post-install
          cp openwrt/files/etc/metaclash/prerm.sh apk-scripts/pre-upgrade
          cp openwrt/files/etc/metaclash/postinst.sh apk-scripts/post-upgrade
          cp openwrt/files/etc/metaclash/prerm.sh apk-scripts/pre-deinstall
          cp openwrt/files/etc/metaclash/postrm.sh apk-scripts/post-deinstall
          chmod 755 apk-scripts/*
          sed -i 's/\r$//' apk-scripts/*

          # OpenWrt APK metadata files for conffile preservation
          printf '%s\n' \
            '/etc/metaclash/config.toml' \
            '/etc/metaclash/overrides.yaml' \
            > apk-root/lib/apk/packages/clashforge.conffiles
          : > apk-root/lib/apk/packages/clashforge.conffiles_static
          while IFS= read -r f; do
            [ -f "apk-root$f" ] || continue
            sum="$(sha256sum "apk-root$f" | awk '{print $1}')"
            echo "$f $sum" >> apk-root/lib/apk/packages/clashforge.conffiles_static
          done < apk-root/lib/apk/packages/clashforge.conffiles

          (cd apk-root && find . -type f -o -type l | sed 's#^\./#/#' | sort > lib/apk/packages/clashforge.list)

          # apk mkpkg options (--info/--script/--files/--output) require apk-tools 3.x.
          # Alpine 3.23 ships apk-tools 3.x; 3.21 still uses 2.14.x.
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            -e PKG_ARCH="$ARCH" \
            -e APK_INTERNAL_VERSION="$APK_INTERNAL_VERSION" \
            -e APK_NAME="$APK_NAME" \
            -e MIHOMO_VER_CLEAN="$MIHOMO_VER_CLEAN" \
            alpine:3.23 \
            sh -euc '
              apk mkpkg \
                --info "name:clashforge" \
                --info "version:${APK_INTERNAL_VERSION}" \
                --info "description:Mihomo (Clash.Meta) proxy manager for OpenWrt. Includes bundled mihomo ${MIHOMO_VER_CLEAN}. Web UI on port 7777." \
                --info "arch:${PKG_ARCH}" \
                --info "license:GPL-3.0" \
                --info "origin:https://github.com/wujun4code/clashforge" \
                --info "url:https://github.com/wujun4code/clashforge" \
                --info "maintainer:wujun4code" \
                --info "depends:ca-bundle" \
                --script "post-install:/work/apk-scripts/post-install" \
                --script "pre-upgrade:/work/apk-scripts/pre-upgrade" \
                --script "post-upgrade:/work/apk-scripts/post-upgrade" \
                --script "pre-deinstall:/work/apk-scripts/pre-deinstall" \
                --script "post-deinstall:/work/apk-scripts/post-deinstall" \
                --files /work/apk-root \
                --output "/work/${APK_NAME}"
            '

          ls -lh "$APK_NAME"
          echo "pkg_name=$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.pkg_arch }}
          path: "*.apk"
          retention-days: 7

  # ────────────────────────────────────────────────────────────
  # Stage 4: Collect ctl scripts (bash, PS1, sh) from checkout
  # ────────────────────────────────────────────────────────────
  upload-installer:
    name: Upload ctl scripts
    runs-on: ubuntu-latest
    needs: build-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: installer
          path: |
            scripts/clashforgectl.sh
            scripts/clashforgectl.ps1
            scripts/clashforgectl_impl.ps1
            scripts/clashforgectl.cmd
            scripts/clashforgectl
          retention-days: 7

  # ────────────────────────────────────────────────────────────
  # Stage 5: Create GitHub Release (tag pushes and manual dispatch)
  # ────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-ui, package-ipk, package-apk, upload-installer]
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Compute pkg version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            TAG="${{ github.event.inputs.version }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          PKG_VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "pkg_version=$PKG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Download IPK artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ipk-*
          path: release-assets/
          merge-multiple: true

      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: apk-*
          path: release-assets/
          merge-multiple: true

      - name: Download clashforgectl.sh
        uses: actions/download-artifact@v4
        with:
          name: installer
          path: release-assets/

      - name: List release assets
        run: ls -lh release-assets/

      - name: Create checksums
        run: |
          cd release-assets
          shopt -s nullglob
          ASSETS=( *.ipk *.apk clashforgectl.sh clashforgectl.ps1 clashforgectl_impl.ps1 clashforgectl.cmd clashforgectl )
          sha256sum "${ASSETS[@]}" > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "ClashForge ${{ steps.ver.outputs.tag }}"
          body: |
            ## ClashForge ${{ steps.ver.outputs.tag }}

            Mihomo (Clash.Meta) 透明代理管理器，适用于 OpenWrt — 单二进制文件，内嵌 Web UI。

            ---

            ### 💻 从电脑远程管理（推荐）

            > 脚本在本机下载 IPK 再上传路由器，比让路由器直接访问 GitHub 更稳。

            **Windows（PowerShell，一行下载）：**
            ```powershell
            irm https://dl.wei1xuan.com/releases/latest/clashforgectl.ps1 -OutFile clashforgectl.ps1
            irm https://dl.wei1xuan.com/releases/latest/clashforgectl_impl.ps1 -OutFile clashforgectl_impl.ps1
            .\clashforgectl.ps1 -Router <路由器IP> compat     # 安装前检查
            .\clashforgectl.ps1 -Router <路由器IP> upgrade    # 一键安装/升级
            ```

            **macOS / Linux（一行下载）：**
            ```sh
            curl -fsSL https://dl.wei1xuan.com/releases/latest/clashforgectl -o clashforgectl && chmod +x clashforgectl
            ./clashforgectl --router <路由器IP> compat        # 安装前检查
            ./clashforgectl --router <路由器IP> upgrade       # 一键安装/升级
            ```

            ---

            ### 🖥️ 路由器本机安装

            SSH 进入路由器后执行，**自动检测 CPU 架构**，自动下载并安装最新版：

            ```sh
            wget -qO- https://dl.wei1xuan.com/releases/latest/clashforgectl.sh | sh
            ```

            **🇨🇳 GitHub 访问慢时：**
            ```sh
            wget -qO- https://ghproxy.com/https://raw.githubusercontent.com/wujun4code/clashforge/main/scripts/clashforgectl.sh | sh
            ```
            > 也可手动指定镜像：`sh clashforgectl.sh --mirror https://ghproxy.com`

            **安装本版本（${{ steps.ver.outputs.tag }}）：**
            ```sh
            wget -qO- https://dl.wei1xuan.com/releases/latest/clashforgectl.sh | sh -s -- --version ${{ steps.ver.outputs.tag }}
            ```

            **全新安装（清除旧版所有残留后重装）：**
            ```sh
            wget -qO- https://dl.wei1xuan.com/releases/latest/clashforgectl.sh | sh -s -- --purge
            ```

            > 💡 安装脚本地址固定，无需随版本更新

            ---

            ### 🌩️ 通过 Cloudflare R2 托管安装（Fork 用户）

            如果你 fork 了本仓库并配置了自己的 Cloudflare R2 存储，可以使用自定义域名直接安装，无需依赖 GitHub：

            ```sh
            wget -qO- https://raw.githubusercontent.com/wujun4code/clashforge/main/scripts/clashforgectl.sh | \
              sh -s -- --base-url https://releases.example.com
            ```

            安装指定版本：
            ```sh
            wget -qO- https://raw.githubusercontent.com/wujun4code/clashforge/main/scripts/clashforgectl.sh | \
              sh -s -- --base-url https://releases.example.com --version ${{ steps.ver.outputs.tag }}
            ```

            > 将 `https://releases.example.com` 替换为你在 R2 bucket 上绑定的自定义域名。
            > R2 配置方法参见：[Fork 后配置自己的 Cloudflare R2 下载加速](https://github.com/wujun4code/clashforge/blob/main/docs/guides/fork-r2-setup.md)

            ---

            ### 🖥️ Hyper-V / x86_64 OpenWrt 快速安装（R2 最新版）

            如果你是在 Hyper-V 里的 x86_64 OpenWrt 虚拟机中安装，可以直接使用 R2 上的最新 x86_64 IPK：

            ```sh
            cd /tmp
            wget -O clashforge-latest-x86_64.ipk https://dl.wei1xuan.com/clashforge-latest-x86_64.ipk
            opkg install --nodeps ./clashforge-latest-x86_64.ipk
            /etc/init.d/clashforge enable
            /etc/init.d/clashforge restart
            ```

            安装完成后打开：`http://<OpenWrt-IP>:7777`

            Windows 主机也可以下载最新 ctl 脚本后远程安装：

            ```powershell
            Invoke-WebRequest 'https://dl.wei1xuan.com/clashforgectl.ps1' -OutFile .\clashforgectl.ps1
            Invoke-WebRequest 'https://dl.wei1xuan.com/clashforgectl_impl.ps1' -OutFile .\clashforgectl_impl.ps1
            .\clashforgectl.ps1 -Router <OpenWrt-IP> upgrade
            ```

            ---

            ### 手动安装 IPK

            先下载对应架构的 IPK，再通过 opkg 安装（`--nodeps` 跳过依赖检查，因 mihomo 已打包在内）：

            #### x86_64（PC 路由 / x86 OpenWrt）
            ```sh
            wget https://github.com/wujun4code/clashforge/releases/download/${{ steps.ver.outputs.tag }}/clashforge_${{ steps.ver.outputs.pkg_version }}_x86_64.ipk
            opkg install --nodeps clashforge_${{ steps.ver.outputs.pkg_version }}_x86_64.ipk
            ```

            #### AArch64 通用（Cortex-A72/A73/A55，NanoPi R4S/R5S 等）
            ```sh
            wget https://github.com/wujun4code/clashforge/releases/download/${{ steps.ver.outputs.tag }}/clashforge_${{ steps.ver.outputs.pkg_version }}_aarch64_generic.ipk
            opkg install --nodeps clashforge_${{ steps.ver.outputs.pkg_version }}_aarch64_generic.ipk
            ```

            #### AArch64 Cortex-A53（Raspberry Pi 3, MT7981/MT7986/MT7622 等）
            ```sh
            wget https://github.com/wujun4code/clashforge/releases/download/${{ steps.ver.outputs.tag }}/clashforge_${{ steps.ver.outputs.pkg_version }}_aarch64_cortex-a53.ipk
            opkg install --nodeps clashforge_${{ steps.ver.outputs.pkg_version }}_aarch64_cortex-a53.ipk
            ```

            ### 手动安装 APK（OpenWrt 25.12+）

            OpenWrt 25.12 及以上使用 `apk`，下载对应架构 APK 后安装：

            #### x86_64
            ```sh
            wget https://github.com/wujun4code/clashforge/releases/download/${{ steps.ver.outputs.tag }}/clashforge_${{ steps.ver.outputs.pkg_version }}_x86_64.apk
            apk add --allow-untrusted ./clashforge_${{ steps.ver.outputs.pkg_version }}_x86_64.apk
            ```

            #### aarch64_generic
            ```sh
            wget https://github.com/wujun4code/clashforge/releases/download/${{ steps.ver.outputs.tag }}/clashforge_${{ steps.ver.outputs.pkg_version }}_aarch64_generic.apk
            apk add --allow-untrusted ./clashforge_${{ steps.ver.outputs.pkg_version }}_aarch64_generic.apk
            ```

            #### aarch64_cortex-a53
            ```sh
            wget https://github.com/wujun4code/clashforge/releases/download/${{ steps.ver.outputs.tag }}/clashforge_${{ steps.ver.outputs.pkg_version }}_aarch64_cortex-a53.apk
            apk add --allow-untrusted ./clashforge_${{ steps.ver.outputs.pkg_version }}_aarch64_cortex-a53.apk
            ```

            ---

            ### 安装完成后

            ```sh
            # Web UI（浏览器打开）
            http://<路由器IP>:7777

            # 查看运行状态
            /etc/init.d/clashforge status

            # 编辑配置（通常不需要手动编辑，通过 Web UI 操作即可）
            vi /etc/metaclash/config.toml
            ```

            ### 卸载

            ```sh
            opkg remove clashforge
            # OpenWrt 25.12+:
            apk del clashforge
            # 或完全清除（含配置和数据）：
            uninstall-clashforge
            ```

            ---

            ### SHA256 校验

            见附件 `SHA256SUMS.txt`
          draft: false
          prerelease: ${{ contains(steps.ver.outputs.tag, 'alpha') || contains(steps.ver.outputs.tag, 'rc') }}
          files: |
            release-assets/*.ipk
            release-assets/*.apk
            release-assets/clashforgectl.sh
            release-assets/clashforgectl.ps1
            release-assets/clashforgectl_impl.ps1
            release-assets/clashforgectl.cmd
            release-assets/clashforgectl
            release-assets/SHA256SUMS.txt

  # ────────────────────────────────────────────────────────────
  # Stage 6: Publish current release assets to Cloudflare R2
  # Keeps both versioned paths and latest convenience aliases fresh.
  # ────────────────────────────────────────────────────────────
  publish-r2:
    name: Publish release assets to R2
    runs-on: ubuntu-latest
    needs: [build-ui, package-ipk, package-apk, upload-installer, release]
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read

    env:
      R2_BUCKET:      ${{ secrets.R2_BUCKET_NAME }}
      R2_ACCOUNT_ID:  ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY:  ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_KEY:  ${{ secrets.R2_SECRET_ACCESS_KEY }}
      TAG: ${{ needs.build-ui.outputs.version }}

    steps:
      - name: Check R2 secrets
        id: r2
        run: |
          if [ -n "$R2_BUCKET" ] && [ -n "$R2_ACCOUNT_ID" ] && [ -n "$R2_ACCESS_KEY" ] && [ -n "$R2_SECRET_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::R2 secrets are incomplete; skip R2 publish. Required: R2_BUCKET_NAME, R2_ACCOUNT_ID, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY."
          fi

      - name: Download IPK artifacts
        if: steps.r2.outputs.enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: ipk-*
          path: r2-assets/
          merge-multiple: true

      - name: Download APK artifacts
        if: steps.r2.outputs.enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: apk-*
          path: r2-assets/
          merge-multiple: true

      - name: Download ctl scripts
        if: steps.r2.outputs.enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          name: installer
          path: r2-assets/

      - name: Create checksums
        if: steps.r2.outputs.enabled == 'true'
        run: |
          cd r2-assets
          shopt -s nullglob
          ASSETS=( *.ipk *.apk clashforgectl.sh clashforgectl.ps1 clashforgectl_impl.ps1 clashforgectl.cmd clashforgectl )
          sha256sum "${ASSETS[@]}" > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Install rclone
        if: steps.r2.outputs.enabled == 'true'
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash
          rclone version

      - name: Configure rclone for R2
        if: steps.r2.outputs.enabled == 'true'
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${R2_ACCESS_KEY}
          secret_access_key = ${R2_SECRET_KEY}
          endpoint = https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com
          acl = private
          EOF

      - name: Upload release assets to R2
        if: steps.r2.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          PKG_VERSION="${TAG#v}"
          X86_IPK="clashforge_${PKG_VERSION}_x86_64.ipk"
          test -f "r2-assets/${X86_IPK}"
          test -f r2-assets/clashforgectl.sh
          test -f r2-assets/clashforgectl.ps1
          test -f r2-assets/clashforgectl_impl.ps1
          test -f r2-assets/clashforgectl.cmd
          test -f r2-assets/clashforgectl

          # Versioned release path and moving latest path used by installers.
          rclone copy r2-assets/ "r2:${R2_BUCKET}/releases/${TAG}/" \
            --s3-no-check-bucket --progress --stats-one-line
          rclone copy r2-assets/ "r2:${R2_BUCKET}/releases/latest/" \
            --s3-no-check-bucket --progress --stats-one-line

          # Root-level convenience aliases for Windows/Hyper-V bootstrap and manual x86_64 install.
          rclone copyto r2-assets/clashforgectl.ps1 "r2:${R2_BUCKET}/clashforgectl.ps1" \
            --s3-no-check-bucket --progress --stats-one-line
          rclone copyto r2-assets/clashforgectl_impl.ps1 "r2:${R2_BUCKET}/clashforgectl_impl.ps1" \
            --s3-no-check-bucket --progress --stats-one-line
          rclone copyto r2-assets/clashforgectl.cmd "r2:${R2_BUCKET}/clashforgectl.cmd" \
            --s3-no-check-bucket --progress --stats-one-line
          rclone copyto r2-assets/clashforgectl.sh "r2:${R2_BUCKET}/clashforgectl.sh" \
            --s3-no-check-bucket --progress --stats-one-line
          rclone copyto r2-assets/clashforgectl "r2:${R2_BUCKET}/clashforgectl" \
            --s3-no-check-bucket --progress --stats-one-line
          rclone copyto "r2-assets/${X86_IPK}" "r2:${R2_BUCKET}/clashforge-latest-x86_64.ipk" \
            --s3-no-check-bucket --progress --stats-one-line

          echo "=== R2 releases/${TAG}/ ==="
          rclone ls "r2:${R2_BUCKET}/releases/${TAG}/"
          echo "=== R2 latest aliases ==="
          rclone ls "r2:${R2_BUCKET}/" | grep -E 'clashforgectl|clashforge-latest-x86_64\.ipk' || true

      - name: Summary
        if: steps.r2.outputs.enabled == 'true'
        run: |
          PKG_VERSION="${TAG#v}"
          X86_IPK="clashforge_${PKG_VERSION}_x86_64.ipk"
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## ✅ R2 Release Assets Published

          **Release:** \`${TAG}\`

          **Versioned paths:**
          - \`releases/${TAG}/clashforgectl.sh\`
          - \`releases/${TAG}/clashforgectl.ps1\`
          - \`releases/${TAG}/clashforgectl_impl.ps1\`
          - \`releases/${TAG}/clashforgectl.cmd\`
          - \`releases/${TAG}/clashforgectl\`
          - \`releases/${TAG}/${X86_IPK}\`

          **Latest paths:**
          - \`releases/latest/clashforgectl.sh\`
          - \`releases/latest/clashforgectl.ps1\`
          - \`releases/latest/clashforgectl_impl.ps1\`
          - \`releases/latest/clashforgectl.cmd\`
          - \`releases/latest/clashforgectl\`
          - \`releases/latest/${X86_IPK}\`
          - \`clashforgectl.ps1\`
          - \`clashforgectl_impl.ps1\`
          - \`clashforgectl.cmd\`
          - \`clashforgectl.sh\`
          - \`clashforgectl\`
          - \`clashforge-latest-x86_64.ipk\`
          EOF
