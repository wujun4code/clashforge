name: Build & Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g. v0.1.0)'
        required: false
        default: 'dev'

jobs:
  # ────────────────────────────────────────────────────────────
  # Stage 1: Build React UI (once, shared across all platforms)
  # ────────────────────────────────────────────────────────────
  build-ui:
    name: Build React UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: cd ui && npm ci

      - name: Build UI
        run: cd ui && npm run build

      - name: Upload UI artifact
        uses: actions/upload-artifact@v7
        with:
          name: ui-dist
          path: ui/dist/
          retention-days: 1

  # ────────────────────────────────────────────────────────────
  # Stage 2: Build Go binaries for each target platform
  # ────────────────────────────────────────────────────────────
  build-binaries:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: build-ui

    strategy:
      matrix:
        include:
          # x86_64 (PC router / VM / x86 OpenWrt)
          - name: x86_64
            goos: linux
            goarch: amd64
            suffix: linux-amd64
            openwrt_arch: x86_64

          # ARMv8 / AArch64 — Cortex-A53/A55/A72 etc.
          # Covers: Raspberry Pi 3/4, NanoPi R4S/R5S, Rockchip, MediaTek MT7986 ...
          - name: aarch64
            goos: linux
            goarch: arm64
            suffix: linux-arm64
            openwrt_arch: aarch64_generic

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Download UI dist
        uses: actions/download-artifact@v8
        with:
          name: ui-dist
          path: internal/api/ui_dist/

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ] && echo "${{ github.ref }}" | grep -q "refs/tags/"; then
            VERSION="${{ github.ref_name }}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Build clashforge binary
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w -X main.buildVersion=${{ steps.version.outputs.version }}" \
            -o dist/clashforge-${{ matrix.suffix }} \
            ./cmd/clashforge

      - name: Verify binary
        run: |
          file dist/clashforge-${{ matrix.suffix }}
          ls -lh dist/clashforge-${{ matrix.suffix }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: clashforge-${{ matrix.suffix }}
          path: dist/clashforge-${{ matrix.suffix }}
          retention-days: 7

  # ────────────────────────────────────────────────────────────
  # Stage 3: Package OpenWrt IPK for each platform
  # ────────────────────────────────────────────────────────────
  package-ipk:
    name: Package IPK ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: build-binaries

    strategy:
      matrix:
        include:
          - name: x86_64
            suffix: linux-amd64
            openwrt_arch: x86_64
            pkg_arch: x86_64

          - name: aarch64
            suffix: linux-arm64
            openwrt_arch: aarch64_generic
            pkg_arch: aarch64_generic

    steps:
      - uses: actions/checkout@v5

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ] && echo "${{ github.ref }}" | grep -q "refs/tags/"; then
            VERSION="${{ github.ref_name }}"
            PKG_VERSION="${VERSION#v}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
            PKG_VERSION="${VERSION#v}"
          else
            SHORT=$(git rev-parse --short HEAD)
            VERSION="dev-$SHORT"
            PKG_VERSION="0.0.1+$SHORT"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "pkg_version=$PKG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Download binary
        uses: actions/download-artifact@v8
        with:
          name: clashforge-${{ matrix.suffix }}
          path: dist/

      - name: Build IPK
        run: |
          VERSION="${{ steps.version.outputs.pkg_version }}"
          ARCH="${{ matrix.pkg_arch }}"
          PKG_NAME="clashforge_${VERSION}_${ARCH}.ipk"

          # Create IPK directory structure
          mkdir -p ipk/CONTROL
          mkdir -p ipk/usr/bin
          mkdir -p ipk/etc/metaclash
          mkdir -p ipk/etc/init.d
          mkdir -p ipk/usr/share/metaclash

          # Copy binary
          cp dist/clashforge-${{ matrix.suffix }} ipk/usr/bin/clashforge
          chmod 755 ipk/usr/bin/clashforge

          # Config files
          cp openwrt/files/etc/metaclash/config.toml.example  ipk/etc/metaclash/config.toml.example
          cp openwrt/files/etc/metaclash/overrides.yaml.example ipk/etc/metaclash/overrides.yaml.example

          # init.d script
          cp openwrt/files/etc/init.d/metaclash ipk/etc/init.d/clashforge
          chmod 755 ipk/etc/init.d/clashforge

          # control file
          cat > ipk/CONTROL/control << EOF
          Package: clashforge
          Version: ${VERSION}
          Architecture: ${ARCH}
          Maintainer: wujun4code
          Section: net
          Priority: optional
          Depends: ca-bundle, ip-full, kmod-nft-tproxy
          Source: https://github.com/wujun4code/clashforge
          Description: Mihomo (Clash.Meta) proxy manager for OpenWrt.
           Lightweight management daemon: config generation, subscription
           management, nftables/iptables TProxy, Web UI, REST API.
           Single static binary with embedded React UI, no Ruby/Lua required.
          EOF

          # conffiles (prevent opkg from overwriting user-edited configs)
          cat > ipk/CONTROL/conffiles << EOF
          /etc/metaclash/config.toml
          /etc/metaclash/overrides.yaml
          EOF

          # postinst script
          cat > ipk/CONTROL/postinst << 'POSTINST'
          #!/bin/sh
          # Create default configs if not already present
          [ -f /etc/metaclash/config.toml ] || \
            cp /etc/metaclash/config.toml.example /etc/metaclash/config.toml
          [ -f /etc/metaclash/overrides.yaml ] || \
            cp /etc/metaclash/overrides.yaml.example /etc/metaclash/overrides.yaml
          # Enable service
          /etc/init.d/clashforge enable 2>/dev/null || true
          echo "ClashForge installed. Edit /etc/metaclash/config.toml then:"
          echo "  /etc/init.d/clashforge start"
          POSTINST
          chmod 755 ipk/CONTROL/postinst

          # prerm script
          cat > ipk/CONTROL/prerm << 'PRERM'
          #!/bin/sh
          /etc/init.d/clashforge stop 2>/dev/null || true
          /etc/init.d/clashforge disable 2>/dev/null || true
          PRERM
          chmod 755 ipk/CONTROL/prerm

          # Build the IPK (ar archive)
          cd ipk

          # Create data.tar.gz
          tar czf ../data.tar.gz \
            --owner=0 --group=0 \
            usr etc

          # Create control.tar.gz
          cd CONTROL
          tar czf ../../control.tar.gz \
            --owner=0 --group=0 \
            control conffiles postinst prerm
          cd ..

          # debian-binary marker
          echo "2.0" > ../debian-binary

          # Assemble the .ipk
          cd ..
          ar r "$PKG_NAME" debian-binary control.tar.gz data.tar.gz
          ls -lh "$PKG_NAME"
          echo "pkg_name=$PKG_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload IPK artifact
        uses: actions/upload-artifact@v7
        with:
          name: ipk-${{ matrix.name }}
          path: "*.ipk"
          retention-days: 30

  # ────────────────────────────────────────────────────────────
  # Stage 4: Create GitHub Release (only on tag push)
  # ────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: package-ipk
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Download all IPK artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: ipk-*
          path: release-assets/
          merge-multiple: true

      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          pattern: clashforge-linux-*
          path: release-assets/
          merge-multiple: true

      - name: List release assets
        run: ls -lh release-assets/

      - name: Create checksums
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "ClashForge ${{ github.ref_name }}"
          body: |
            ## ClashForge ${{ github.ref_name }}

            Mihomo (Clash.Meta) proxy manager for OpenWrt — single static binary with embedded Web UI.

            ### Installation on OpenWrt

            #### x86_64
            ```sh
            opkg install clashforge_*_x86_64.ipk
            ```

            #### AArch64 (ARMv8, Cortex-A53/A55/A72)
            ```sh
            opkg install clashforge_*_aarch64_generic.ipk
            ```

            ### After installation
            ```sh
            # Edit config
            vi /etc/metaclash/config.toml

            # Start
            /etc/init.d/clashforge start

            # Access Web UI
            http://<router-ip>:7777
            ```

            ### Manual binary install
            Download `clashforge-linux-amd64` or `clashforge-linux-arm64`, copy to `/usr/bin/clashforge`, `chmod +x`.

            ### Checksums
            See `SHA256SUMS.txt`.
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: |
            release-assets/*.ipk
            release-assets/clashforge-linux-*
            release-assets/SHA256SUMS.txt
