name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  ui-build:
    name: UI Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ui

      - name: Build
        run: npm run build
        working-directory: ui

      - uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/
          retention-days: 1

  go-build:
    name: Go Build
    runs-on: ubuntu-latest
    needs: ui-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: internal/api/ui_dist/

      - name: Build
        run: go build ./...

  merge-and-dispatch-release:
    name: Merge and dispatch release
    runs-on: ubuntu-latest
    needs: go-build
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
    concurrency:
      group: merge-release-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
      actions: write
      checks: read
      statuses: read
    steps:
      - name: Merge PR if all checks are green, then dispatch tagging
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          pr_json=$(gh pr view "$PR_NUMBER" --repo "$REPO" \
            --json number,title,isDraft,headRefOid,mergeStateStatus,statusCheckRollup)

          title=$(jq -r '.title' <<<"$pr_json")
          is_draft=$(jq -r '.isDraft' <<<"$pr_json")
          head_oid=$(jq -r '.headRefOid' <<<"$pr_json")
          merge_state=$(jq -r '.mergeStateStatus // "UNKNOWN"' <<<"$pr_json")
          pending=$(jq '[.statusCheckRollup[]? | select((.name // "") != "Merge and dispatch release" and (.name // "") != "enable-auto-merge" and (.status // "") != "COMPLETED")] | length' <<<"$pr_json")
          failed=$(jq '[.statusCheckRollup[]? | select((.name // "") != "Merge and dispatch release" and (.name // "") != "enable-auto-merge" and (((.conclusion // "") | IN("SUCCESS", "SKIPPED", "NEUTRAL")) | not))] | length' <<<"$pr_json")

          echo "PR #$PR_NUMBER: $title"
          echo "draft=$is_draft head=$head_oid expected=$EXPECTED_HEAD mergeState=$merge_state pendingChecks=$pending failedChecks=$failed"

          if [ "$is_draft" = "true" ]; then
            echo "Skip: draft PR"
            exit 0
          fi

          if [ "$head_oid" != "$EXPECTED_HEAD" ]; then
            echo "Skip: PR head changed while checks were running"
            exit 0
          fi

          if [ "$pending" -ne 0 ] || [ "$failed" -ne 0 ]; then
            echo "Skip: not all checks are green yet"
            exit 0
          fi

          if ! gh pr merge "$PR_NUMBER" --repo "$REPO" --squash; then
            echo "Skip: GitHub did not allow merge yet"
            exit 0
          fi

          merge_sha=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json mergeCommit --jq '.mergeCommit.oid // empty')
          if [ -z "$merge_sha" ]; then
            echo "::error::PR #$PR_NUMBER merged, but merge commit SHA was not available"
            exit 1
          fi

          echo "Merged PR #$PR_NUMBER as $merge_sha"
          gh workflow run auto-tag.yml \
            --repo "$REPO" \
            --ref main \
            --field sha="$merge_sha"
          echo "Dispatched auto-tag.yml for $merge_sha"
