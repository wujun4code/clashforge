name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  ui-build:
    name: UI Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ui

      - name: Build
        run: npm run build
        working-directory: ui

      - uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/
          retention-days: 1

  go-build:
    name: Go Build
    runs-on: ubuntu-latest
    needs: ui-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: internal/api/ui_dist/

      - name: Build
        run: go build ./...

