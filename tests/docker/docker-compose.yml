services:
  # ── Traffic integration test (uses mihomo + real proxy) ──────────────────
  clashforge-test:
    build:
      context: ../..
      dockerfile: tests/docker/Dockerfile
    container_name: clashforge-integration-test
    volumes:
      - ../../testdata/sample-clash-config.yaml:/testdata/sample-clash-config.yaml:ro

  # ── API integration test (production image + curl/python3 for testing) ───
  clashforge-api-test:
    build:
      context: ../..
      dockerfile: tests/docker/Dockerfile.apitest
    container_name: clashforge-api-test
    volumes:
      - ./api_test.sh:/api_test.sh:ro
      - ./api_test_entrypoint.sh:/api_test_entrypoint.sh:ro
