name: clashforge_mobile
description: "ClashForge Mobile VPN Client"
publish_to: 'none'

version: 0.1.0-beta.1+35

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  yaml: ^3.1.2
  http: ^1.1.0
  uuid: ^4.0.0
  shared_preferences: ^2.3.0
  url_launcher: ^6.3.0
  encrypt: ^5.0.1
  pointycastle: ^3.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/geodata/country.mmdb
    - assets/geodata/geosite.dat
